version: 1
build:
  main: cmd/sparkdreamd
  tags:
    - mainnet
validation: sovereign
# Test-only accounts. Mnemonics are committed intentionally — they derive the
# specific addresses hardcoded in x/commons/keeper/genesis_vals.go (founder,
# council members). Changing these mnemonics will break governance bootstrap
# and all E2E tests. These keys hold no real funds and are never used in production.
accounts:
- name: alice
  coins: [20000000000000uspark]
  mnemonic: "punch toss leisure miss pulse hand dentist ozone gadget pretty narrow wise ankle manage equal carry devote naive hungry betray mean word music grunt"
- name: bob
  coins: [10000000000000uspark]
  mnemonic: "chat opera segment access debate stool axis govern wave tool drift crater miracle yellow quote orchard start mistake normal evoke simple sing mimic retreat"
- name: carol
  coins: [5000000000000uspark]
  mnemonic: "remove enable fade luxury post call spring lock once retire chef luggage bless lend benefit plug phrase poem grief quit trouble still manage solve"
- name: dave
  coins: [5000000uspark]
  mnemonic: "pledge dice input pave satisfy student slight author battle safe place purity syrup skin buyer sick raven shock decrease acoustic fluid kick muffin soft"
faucet:
  name: bob
  coins: [1000uspark]
genesis:
  consensus:
    params:
      abci:
        vote_extensions_enable_height: "1"
  app_state:
    bank:
      denom_metadata:
      - base: uspark
        denom_units:
        - denom: uspark
          exponent: 0
        - denom: spark
          exponent: 6
        description: Native token of Spark Dream A T E L I E R.
        display: spark
        name: spark
        symbol: spark
      - base: udream
        denom_units:
        - denom: udream
          exponent: 0
        - denom: dream
          exponent: 6
        description: Internal coordination token - earned through contribution, not traded.
        display: dream
        name: dream
        symbol: dream
    commons:
      params:
        proposal_fee: "5000000uspark"
    gnovm:
      params:
        sysnames_pkgpath: ""
        chain_domain: "gno.land"
        default_deposit: "100000uspark"
        storage_price: "1uspark"
    crisis:
      constant_fee:
        denom: uspark
    distribution:
      params:
        community_tax: "0.15"
    gov:
      params:
        max_deposit_period: "172800s"      # 48 hours
        min_deposit:
          - amount: "50000000"
            denom: "uspark"
        voting_period: "432000s"           # 5 days
        expedited_min_deposit:
          - amount: "100000000"
            denom: "uspark"
        expedited_voting_period: "86400s"  # 1 day
    mint:
      params:
        mint_denom: "uspark"
        goal_bonded: "0.67"
        inflation_max: "0.05"
        inflation_min: "0.02"
        inflation_rate_change: "0.13"
    staking:
      params:
        bond_denom: uspark
    season:
      season:
        number: 1
        name: "Genesis Season"
        theme: "The Beginning"
        start_block: 1
        end_block: 2592001  # epoch_blocks * season_duration_epochs (17280 * 150) + start_block
        status: SEASON_STATUS_ACTIVE
        extensions_count: 0
        total_extension_epochs: 0
        original_end_block: 2592001
      params:
        epoch_blocks: "17280"             # ~1 day at 5s blocks
        season_duration_epochs: "150"     # 150 epochs = ~5 months
        transition_batch_size: "100"      # 100 members per block per phase
        transition_grace_period: "50400"  # ~1 week in blocks
        display_name_appeal_period_blocks: "100800"  # ~7 days
        # Nomination params - production values
        nomination_min_stake: "10"
        retro_reward_budget_ratio: "0.250000000000000000"  # 25% of initiative minting
        retro_reward_budget_min: "10000000000"             # 10,000 DREAM floor
        retro_reward_budget_max: "75000000000"             # 75,000 DREAM ceiling
        retro_reward_min_conviction: "50"
      member_profile_map:
      # Alice - High level founder with multiple achievements and titles
      - address: sprkdrm1afyuna8gqe55t7jztxcg0aleg0k5txep72pfan  # alice
        display_name: "Alice"
        username: "alice"
        display_title: "veteran"
        season_xp: 5000
        lifetime_xp: 5000
        season_level: 8
