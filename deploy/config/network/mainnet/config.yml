        jury_duties_completed: 0
        votes_cast: 2
        forum_helpful_count: 5
    rep:
      params:
        # Time - PRODUCTION: ~1 day epochs, ~5 month seasons
        epoch_blocks: "14400"                      # ~1 day at 6s blocks
        season_duration_epochs: "150"              # ~5 months
        # Conviction
        conviction_half_life_epochs: "7"           # 7 epochs = ~1 week
        conviction_per_dream: "0.2"                # sqrt scaling
        # Review periods
        default_review_period_epochs: "7"          # ~1 week
        default_challenge_period_epochs: "7"       # ~1 week
        # Invitations
        invitation_accountability_epochs: "150"    # 1 full season
        # Interim compensation
        interim_deadline_epochs: "7"               # ~1 week
        # Interim budgets (in micro-DREAM)
        simple_complexity_budget: "50000000"        # 50 DREAM
        standard_complexity_budget: "150000000"     # 150 DREAM
        complex_complexity_budget: "400000000"      # 400 DREAM
        expert_complexity_budget: "1000000000"      # 1000 DREAM
        solo_expert_bonus_rate: "0.5"               # 50% bonus for solo experts
        # Challenge response deadline
