      # Carol - New member, minimal progress
      - address: sprkdrm1a5wpjpcj0g7s38lqtlp54muytlal3j6jcmhjqw  # carol
        display_name: "Carol"
        username: "carol"
        display_title: ""
        season_xp: 300
        lifetime_xp: 300
        season_level: 2
        unlocked_titles:
        - "newcomer"
        achievements:
        - "voice_heard"
        invitations_successful: 0
        challenges_won: 0
        jury_duties_completed: 0
        votes_cast: 2
        forum_helpful_count: 5
    rep:
      params:
        # Time - DEVNET: ~30 min epochs, ~15 hour seasons
        epoch_blocks: "300"                        # ~30 minutes (DEVNET; production: 14400 ~1 day)
        season_duration_epochs: "30"               # ~15 hours (DEVNET; production: 150 ~5 months)
        # Conviction - DEVNET: realistic but faster decay
        conviction_half_life_epochs: "3"           # 3 epochs = ~90 min (DEVNET; production: 7 ~1 week)
        conviction_per_dream: "0.2"                # same as production (sqrt scaling)
        # Review periods - DEVNET: ~90 minutes
        default_review_period_epochs: "3"          # ~90 min (DEVNET; production: 7 ~1 week)
        default_challenge_period_epochs: "3"       # ~90 min (DEVNET; production: 7 ~1 week)
        # Invitations - DEVNET: 1 season
        invitation_accountability_epochs: "30"     # 1 season (DEVNET; production: 150)
        # Interim compensation - DEVNET: ~3 hours deadline
        interim_deadline_epochs: "6"               # ~3 hours (DEVNET; production: 7 ~1 week)
        # Interim budgets - same as production (in micro-DREAM)
        simple_complexity_budget: "50000000"        # 50 DREAM
        standard_complexity_budget: "150000000"     # 150 DREAM
        complex_complexity_budget: "400000000"      # 400 DREAM
        expert_complexity_budget: "1000000000"      # 1000 DREAM
        solo_expert_bonus_rate: "0.5"               # 50% bonus for solo experts
        # Challenge response deadline - DEVNET: ~1 hour
        challenge_response_deadline_epochs: "2"    # ~1 hour (DEVNET; production: 3 ~3 days)
        # Gift rate limiting - DEVNET: ~30 min cooldown
        gift_cooldown_blocks: "300"                # ~30 min (DEVNET; production: 14400 ~1 day)
        max_gifts_per_sender_epoch: "2000000000"   # 2000 DREAM per epoch (same as production)
        # Jury - DEVNET: smaller jury, lower rep threshold
        jury_size: 3                               # DEVNET; production: 5
        min_juror_reputation: "30"                 # DEVNET; production: 50
        # Anti-whale staking cap
        max_initiative_stake_per_member: "50000000000"  # 50,000 DREAM (same as production)
        # Anti-collusion caps
        max_initiative_rewards_per_season: "100000000000000"  # 100,000 DREAM
        large_project_budget_threshold: "10000000000"  # 10,000 DREAM
        # Trust level configuration - uses devnet build tag values
