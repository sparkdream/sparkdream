version: 1
build:
  main: cmd/sparkdreamd
  tags:
    - devnet
validation: sovereign
# Test-only accounts. Mnemonics are committed intentionally — they derive the
# specific addresses hardcoded in x/commons/keeper/genesis_vals.go (founder,
# council members). Changing these mnemonics will break governance bootstrap
# and all E2E tests. These keys hold no real funds and are never used in production.
accounts:
- name: alice
  coins: [20000000000000uspark]
  mnemonic: "punch toss leisure miss pulse hand dentist ozone gadget pretty narrow wise ankle manage equal carry devote naive hungry betray mean word music grunt"
- name: bob
  coins: [10000000000000uspark]
  mnemonic: "chat opera segment access debate stool axis govern wave tool drift crater miracle yellow quote orchard start mistake normal evoke simple sing mimic retreat"
- name: carol
  coins: [5000000000000uspark]
  mnemonic: "remove enable fade luxury post call spring lock once retire chef luggage bless lend benefit plug phrase poem grief quit trouble still manage solve"
- name: dave
  coins: [5000000uspark]
  mnemonic: "pledge dice input pave satisfy student slight author battle safe place purity syrup skin buyer sick raven shock decrease acoustic fluid kick muffin soft"
faucet:
  name: bob
  coins: [1000uspark]
genesis:
  consensus:
    params:
      abci:
        vote_extensions_enable_height: "1"
  app_state:
    bank:
      denom_metadata:
      - base: uspark
        denom_units:
        - denom: uspark
          exponent: 0
        - denom: spark
          exponent: 6
        description: Native token of Spark Dream A T E L I E R.
        display: spark
        name: spark
        symbol: spark
      - base: udream
        denom_units:
        - denom: udream
          exponent: 0
        - denom: dream
          exponent: 6
        description: Internal coordination token - earned through contribution, not traded.
        display: dream
        name: dream
        symbol: dream
    commons:
      params:
        proposal_fee: "5000000uspark"
    gnovm:
      params:
        sysnames_pkgpath: ""
        chain_domain: "gno.land"
        default_deposit: "100000uspark"
        storage_price: "1uspark"
    crisis:
      constant_fee:
        denom: uspark
    distribution:
      params:
        community_tax: "0.15"
    gov:
      params:
        max_deposit_period: "1800s"       # 30 minutes (production: days)
        min_deposit:
          - amount: "50000000"
            denom: "uspark"
        voting_period: "3600s"            # 1 hour (production: days)
        expedited_min_deposit:
          - amount: "100000000"
            denom: "uspark"
        expedited_voting_period: "1800s"  # 30 minutes (production: hours)
    mint:
      params:
        mint_denom: "uspark"
        goal_bonded: "0.67"
        inflation_max: "0.05"
        inflation_min: "0.02"
        inflation_rate_change: "0.13"
    staking:
      params:
        bond_denom: uspark
    season:
      season:
        number: 1
        name: "Genesis Season"
        theme: "The Beginning"
        start_block: 1
        end_block: 9001  # epoch_blocks * season_duration_epochs (300 * 30) + start_block
        status: SEASON_STATUS_ACTIVE
        extensions_count: 0
        total_extension_epochs: 0
        original_end_block: 9001
      params:
        epoch_blocks: "300"              # ~30 minutes at 6s blocks (production: 17280 ~1 day)
        season_duration_epochs: "30"     # 30 epochs = ~15 hours (production: 150 ~5 months)
        transition_batch_size: "50"      # 50 members per block per phase (production: 100)
        transition_grace_period: "600"   # ~1 hour in blocks (production: 50400 ~1 week)
        display_name_appeal_period_blocks: "3600"  # ~6 hours (production: 100800 ~7 days)
        # Nomination params - DEVNET values
        nomination_min_stake: "5"                  # 5 udream (production: 10)
        retro_reward_budget_per_season: "25000"    # 25000 DREAM (production: 50000)
        retro_reward_min_conviction: "25"          # (production: 50)
      member_profile_map:
      # Alice - High level founder with multiple achievements and titles
      - address: sprkdrm1afyuna8gqe55t7jztxcg0aleg0k5txep72pfan  # alice
        display_name: "Alice"
        username: "alice"
        display_title: "veteran"
        season_xp: 5000
        lifetime_xp: 5000
        season_level: 8
        unlocked_titles:
        - "newcomer"
        - "veteran"
        - "rising_star"
        achievements:
        - "first_step"
        - "voice_heard"
        - "contributor"
        invitations_successful: 5
        challenges_won: 2
        jury_duties_completed: 3
        votes_cast: 15
        forum_helpful_count: 50
      # Bob - Mid level with some achievements
      - address: sprkdrm1g5ad4qmzqpfkfzgktx6za005qt2t0v56jy529y  # bob
        display_name: "Bob"
        username: "bob"
        display_title: "newcomer"
        season_xp: 1500
        lifetime_xp: 1500
        season_level: 6
        unlocked_titles:
        - "newcomer"
        achievements:
        - "first_step"
        - "voice_heard"
        invitations_successful: 2
        challenges_won: 0
        jury_duties_completed: 1
        votes_cast: 5
        forum_helpful_count: 15
      # Carol - New member, minimal progress
      - address: sprkdrm1a0gkdyzcnsjrl2s5vlywkancparhp53fucz3zz  # carol
        display_name: "Carol"
        username: "carol"
        display_title: ""
        season_xp: 300
        lifetime_xp: 300
        season_level: 2
        unlocked_titles:
        - "newcomer"
        achievements:
        - "voice_heard"
        invitations_successful: 0
        challenges_won: 0
        jury_duties_completed: 0
        votes_cast: 2
        forum_helpful_count: 5
    rep:
      params:
        # Time - DEVNET: ~30 min epochs, ~15 hour seasons
        epoch_blocks: "300"                        # ~30 minutes (production: 14400 ~1 day)
        season_duration_epochs: "30"               # ~15 hours (production: 150 ~5 months)
        # Conviction - DEVNET: realistic but faster decay
        conviction_half_life_epochs: "3"           # 3 epochs = ~90 min (production: 7 ~1 week)
        conviction_per_dream: "0.2"                # same as production (sqrt scaling)
        # Review periods - DEVNET: ~90 minutes
        default_review_period_epochs: "3"          # ~90 min (production: 7 ~1 week)
        default_challenge_period_epochs: "3"       # ~90 min (production: 7 ~1 week)
        # Invitations - DEVNET: 1 season
        invitation_accountability_epochs: "30"     # 1 season (production: 150)
        # Interim compensation - DEVNET: ~3 hours deadline
        interim_deadline_epochs: "6"               # ~3 hours (production: 7 ~1 week)
        # Interim budgets - same as production (in micro-DREAM)
        simple_complexity_budget: "50000000"        # 50 DREAM
        standard_complexity_budget: "150000000"     # 150 DREAM
        complex_complexity_budget: "400000000"      # 400 DREAM
        expert_complexity_budget: "1000000000"      # 1000 DREAM
        solo_expert_bonus_rate: "0.5"               # 50% bonus for solo experts
        # Challenge response deadline - DEVNET: ~1 hour
        challenge_response_deadline_epochs: "2"    # ~1 hour (production: 3 ~3 days)
        # Gift rate limiting - DEVNET: ~30 min cooldown
        gift_cooldown_blocks: "300"                # ~30 min (production: 14400 ~1 day)
        max_gifts_per_sender_epoch: "2000000000"   # 2000 DREAM per epoch (same as production)
        # Jury - DEVNET: smaller jury, lower rep threshold
        jury_size: 3                               # (production: 5)
        min_juror_reputation: "30"                 # (production: 50)
        # Trust level configuration - uses devnet build tag values
      member_map:
      - address: sprkdrm1afyuna8gqe55t7jztxcg0aleg0k5txep72pfan  # alice
        dream_balance: "50000000000"  # 50000 DREAM (Tier 1 founder)
        staked_dream: "0"
        lifetime_earned: "50000000000"
        lifetime_burned: "0"
        reputation_scores: {}
        lifetime_reputation: {}
        trust_level: TRUST_LEVEL_CORE
        trust_level_updated_at: 0
        joined_season: 0
        joined_at: 0
        invited_by: ""
        invitation_chain: []
        invitation_credits: 10
        status: MEMBER_STATUS_ACTIVE
        zeroed_at: 0
        zeroed_count: 0
        last_decay_epoch: 0
        tips_given_this_epoch: 0
        last_tip_epoch: 0
        completed_interims_count: 0
        completed_initiatives_count: 0
      - address: sprkdrm1g5ad4qmzqpfkfzgktx6za005qt2t0v56jy529y  # bob
        dream_balance: "25000000000"  # 25000 DREAM (Tier 2 founder)
        staked_dream: "0"
        lifetime_earned: "25000000000"
        lifetime_burned: "0"
        reputation_scores: {}
        lifetime_reputation: {}
        trust_level: TRUST_LEVEL_ESTABLISHED
        trust_level_updated_at: 0
        joined_season: 0
        joined_at: 0
        invited_by: ""
        invitation_chain: []
        invitation_credits: 5
        status: MEMBER_STATUS_ACTIVE
        zeroed_at: 0
        zeroed_count: 0
        last_decay_epoch: 0
        tips_given_this_epoch: 0
        last_tip_epoch: 0
        completed_interims_count: 0
        completed_initiatives_count: 0
      - address: sprkdrm1a0gkdyzcnsjrl2s5vlywkancparhp53fucz3zz  # carol
        dream_balance: "10000000000"  # 10000 DREAM (Tier 3 founder)
        staked_dream: "0"
        lifetime_earned: "10000000000"
        lifetime_burned: "0"
        reputation_scores: {}
        lifetime_reputation: {}
        trust_level: TRUST_LEVEL_PROVISIONAL
        trust_level_updated_at: 0
        joined_season: 0
        joined_at: 0
