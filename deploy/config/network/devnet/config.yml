version: 1
build:
  main: cmd/sparkdreamd
  tags:
    - devnet
validation: sovereign
accounts:
- name: alice
  address: sprkdrm1mm04tct5hspk2qzjtf0xaqyjl46ajhcuc4wxcs
  coins: [20000000000000uspark]  # 20,000,000 SPARK
- name: bob
  address: sprkdrm16ef99dd70nzl2lpvwcpz6k84tnhasw009uexc6
  coins: [10000000000000uspark]  # 10,000,000 SPARK
- name: carol
