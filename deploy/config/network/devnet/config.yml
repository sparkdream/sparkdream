- name: dave
  address: sprkdrm1v94rgfy8d3e345yva7p2p9uaaf6hle07lhkfs9
  coins: [5000000uspark]         # 5 SPARK (intentionally tiny — non-member test account)
genesis:
  consensus:
    params:
      abci:
        vote_extensions_enable_height: "1"
  app_state:
    bank:
      denom_metadata:
      - base: uspark
        denom_units:
        - denom: uspark
          exponent: 0
        - denom: spark
          exponent: 6
        description: Native token of Spark Dream A T E L I E R.
        display: spark
        name: spark
        symbol: spark
      - base: udream
        denom_units:
        - denom: udream
          exponent: 0
        - denom: dream
          exponent: 6
        description: Internal coordination token - earned through contribution, not traded.
        display: dream
        name: dream
        symbol: dream
    commons:
      params:
        proposal_fee: "5000000uspark"
      category_map:
      - category_id: 1
        title: "General"
        description: "General discussion"
        members_only_write: false
        admin_only_write: false
      - category_id: 2
        title: "Governance"
        description: "Governance proposals and discussion"
        members_only_write: true
        admin_only_write: false
      next_category_id: 3
    gnovm:
      params:
        sysnames_pkgpath: ""
        chain_domain: "gno.land"
        default_deposit: "100000uspark"
        storage_price: "1uspark"
    crisis:
      constant_fee:
        denom: uspark
    distribution:
      fee_pool:
        community_pool:
        - denom: uspark
          amount: "95000000000000"  # 95,000,000 SPARK (95%) — x/split routes to councils on first block
      params:
        community_tax: "0.15"
    gov:
      params:
        max_deposit_period: "1800s"       # 30 minutes (DEVNET; production: 172800s = 48h)
        min_deposit:
          - amount: "50000000"
            denom: "uspark"
        voting_period: "3600s"            # 1 hour (DEVNET; production: 432000s = 5d)
        expedited_min_deposit:
          - amount: "100000000"
            denom: "uspark"
        expedited_voting_period: "1800s"  # 30 minutes (DEVNET; production: 86400s = 1d)
    mint:
      params:
        mint_denom: "uspark"
        goal_bonded: "0.67"
        inflation_max: "0.05"
        inflation_min: "0.02"
        inflation_rate_change: "0.13"
    staking:
      params:
        bond_denom: uspark
    season:
      season:
        number: 1
        name: "Genesis Season"
        theme: "The Beginning"
        start_block: 1
        end_block: 9001  # epoch_blocks * season_duration_epochs (300 * 30) + start_block
        status: SEASON_STATUS_ACTIVE
        extensions_count: 0
        total_extension_epochs: 0
        original_end_block: 9001
      params:
        epoch_blocks: "300"              # ~30 minutes at 6s blocks (DEVNET; production: 17280 ~1 day)
        season_duration_epochs: "30"     # 30 epochs = ~15 hours (DEVNET; production: 150 ~5 months)
        transition_batch_size: "50"      # 50 members per block per phase (DEVNET; production: 100)
        transition_grace_period: "600"   # ~1 hour in blocks (DEVNET; production: 50400 ~1 week)
        display_name_appeal_period_blocks: "3600"  # ~6 hours (DEVNET; production: 100800 ~7 days)
        # Nomination params - DEVNET values
        nomination_min_stake: "5"                          # 5 udream (DEVNET; production: 10)
        retro_reward_budget_ratio: "0.250000000000000000"  # same as production
        retro_reward_budget_min: "5000000000"              # 5,000 DREAM floor (DEVNET; production: 10,000)
        retro_reward_budget_max: "37500000000"             # 37,500 DREAM ceiling (DEVNET; production: 75,000)
        retro_reward_min_conviction: "25"                  # DEVNET; production: 50
      member_profile_map:
      # Alice - High level founder with multiple achievements and titles
      - address: sprkdrm1mm04tct5hspk2qzjtf0xaqyjl46ajhcuc4wxcs  # alice
        display_name: "Alice"
        username: "alice"
        display_title: "veteran"
        season_xp: 5000
        lifetime_xp: 5000
        season_level: 8
        unlocked_titles:
        - "newcomer"
        - "veteran"
        - "rising_star"
        achievements:
        - "first_step"
        - "voice_heard"
        - "contributor"
        invitations_successful: 5
        challenges_won: 2
        jury_duties_completed: 3
        votes_cast: 15
        forum_helpful_count: 50
      # Bob - Mid level with some achievements
      - address: sprkdrm16ef99dd70nzl2lpvwcpz6k84tnhasw009uexc6  # bob
        display_name: "Bob"
        username: "bob"
        display_title: "newcomer"
        season_xp: 1500
        lifetime_xp: 1500
        season_level: 6
        unlocked_titles:
        - "newcomer"
        achievements:
