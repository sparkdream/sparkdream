        season_duration_epochs: "10"  # 10 epochs per season (short for testing)
        transition_batch_size: "1"  # 1 member per block per phase (slow for abort/skip testing)
        transition_grace_period: "10"  # 10 blocks grace after abort (short for testing)
        display_name_appeal_period_blocks: "20"  # ~20 seconds (short for testing; default 100800)
