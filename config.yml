version: 1
build:
  main: cmd/sparkdreamd
  tags:
    - testparams
validation: sovereign
# Test-only accounts. Mnemonics are committed intentionally — they derive the
# specific addresses hardcoded in x/commons/keeper/genesis_vals.go (founder,
# council members). Changing these mnemonics will break governance bootstrap
# and all E2E tests. These keys hold no real funds and are never used in production.
accounts:
- name: alice
  coins: [20000000000000uspark]
  mnemonic: "punch toss leisure miss pulse hand dentist ozone gadget pretty narrow wise ankle manage equal carry devote naive hungry betray mean word music grunt"
- name: bob
  coins: [10000000000000uspark]
  mnemonic: "chat opera segment access debate stool axis govern wave tool drift crater miracle yellow quote orchard start mistake normal evoke simple sing mimic retreat"
- name: carol
  coins: [5000000000000uspark]
  mnemonic: "remove enable fade luxury post call spring lock once retire chef luggage bless lend benefit plug phrase poem grief quit trouble still manage solve"
- name: dave
  coins: [5000000uspark]
  mnemonic: "pledge dice input pave satisfy student slight author battle safe place purity syrup skin buyer sick raven shock decrease acoustic fluid kick muffin soft"
faucet:
  name: bob
  coins: [1000uspark]
genesis:
  consensus:
    params:
      abci:
        vote_extensions_enable_height: "1"
  app_state:
    bank:
      denom_metadata:
      - base: uspark
        denom_units:
        - denom: uspark
          exponent: 0
        - denom: spark
          exponent: 6
        description: Native token of Spark Dream A T E L I E R.
        display: spark
        name: spark
        symbol: spark
      - base: udream
        denom_units:
        - denom: udream
          exponent: 0
        - denom: dream
          exponent: 6
        description: Internal coordination token - earned through contribution, not traded.
        display: dream
        name: dream
        symbol: dream
    commons:
      params:
        proposal_fee: "5000000uspark"
      category_map:
      - category_id: 1
        title: "General"
        description: "General discussion"
        members_only_write: false
        admin_only_write: false
      - category_id: 2
        title: "Governance"
        description: "Governance proposals and discussion"
        members_only_write: true
        admin_only_write: false
      next_category_id: 3
    gnovm:
      params:
        sysnames_pkgpath: ""
        chain_domain: "gno.land"
        default_deposit: "100000uspark"
        storage_price: "1uspark"
    crisis:
      constant_fee:
        denom: uspark
    distribution:
      params:
        community_tax: "0.15"
    gov:
      params:
        max_deposit_period: "30s"
        min_deposit:
          - amount: "50000000"
            denom: "uspark"
        voting_period: "60s"
        expedited_min_deposit:
          - amount: "100000000"
            denom: "uspark"
        expedited_voting_period: "40s"
    mint:
      params:
        mint_denom: "uspark"
        goal_bonded: "0.67"
        inflation_max: "0.05"
        inflation_min: "0.02"
        inflation_rate_change: "0.13"
    staking:
      params:
        bond_denom: uspark
    season:
      season:
        number: 1
        name: "Genesis Season"
        theme: "The Beginning"
        start_block: 1
        end_block: 1001  # epoch_blocks * season_duration_epochs (100 * 10) + start_block
        status: SEASON_STATUS_ACTIVE
        extensions_count: 0
        total_extension_epochs: 0
        original_end_block: 1001
      params:
        epoch_blocks: "100"  # ~100 blocks per epoch (short for testing)
        season_duration_epochs: "10"  # 10 epochs per season (short for testing)
        transition_batch_size: "1"  # 1 member per block per phase (slow for abort/skip testing)
        transition_grace_period: "10"  # 10 blocks grace after abort (short for testing)
        display_name_appeal_period_blocks: "20"  # ~20 seconds (short for testing; default 100800)
        # Nomination params - TESTING values
        nomination_min_stake: "1"  # 1 udream minimum stake for testing
        retro_reward_budget_ratio: "0.250000000000000000"  # 25% of initiative minting
        retro_reward_budget_min: "1000000000"  # 1000 DREAM in micro-DREAM for testing
        retro_reward_budget_max: "75000000000"  # 75,000 DREAM in micro-DREAM
        retro_reward_min_conviction: "1"  # minimal conviction required for testing
        guild_hop_cooldown_epochs: "1"  # 1 epoch (~100 blocks) for testing (default 30)
      member_profile_map:
      # Alice - High level founder with multiple achievements and titles
      - address: sprkdrm1afyuna8gqe55t7jztxcg0aleg0k5txep72pfan  # alice
        display_name: "Alice"
        username: "alice"
        display_title: "veteran"
        season_xp: 5000
        lifetime_xp: 5000
        season_level: 8  # sqrt(5000/100) ≈ 7.07 → level 8
        unlocked_titles:
        - "newcomer"
        - "veteran"
        - "rising_star"
        achievements:
        - "first_step"
        - "voice_heard"
        - "contributor"
        invitations_successful: 5
        challenges_won: 2
        jury_duties_completed: 3
        votes_cast: 15
        forum_helpful_count: 50
      # Bob - Mid level with some achievements
      - address: sprkdrm1g5ad4qmzqpfkfzgktx6za005qt2t0v56jy529y  # bob
        display_name: "Bob"
        username: "bob"
        display_title: "newcomer"
        season_xp: 1500
        lifetime_xp: 1500
        season_level: 6  # effective XP = 1500 + (5*5) + (15*5) = 1600 → level 6
        unlocked_titles:
        - "newcomer"
        achievements:
        - "first_step"
        - "voice_heard"
        invitations_successful: 2
        challenges_won: 0
        jury_duties_completed: 1
        votes_cast: 5
        forum_helpful_count: 15
      # Carol - New member, minimal progress
      - address: sprkdrm1a0gkdyzcnsjrl2s5vlywkancparhp53fucz3zz  # carol
        display_name: "Carol"
        username: "carol"
        display_title: ""
        season_xp: 300
        lifetime_xp: 300
        season_level: 2  # sqrt(300/100) ≈ 1.73 → level 2
        unlocked_titles:
        - "newcomer"
        achievements:
        - "voice_heard"
        invitations_successful: 0
        challenges_won: 0
        jury_duties_completed: 0
        votes_cast: 2
        forum_helpful_count: 5
    rep:
      params:
        # Time - FAST for testing
        epoch_blocks: "10"  # ~1 minute (was ~1 day)
        season_duration_epochs: "100"  # ~100 minutes (was ~5 months)
        # Conviction - FAST for testing + FIXED with sqrt scaling
        conviction_half_life_epochs: "1"  # 1 epoch = ~1 minute half-life (was 7 days)
        conviction_per_dream: "0.2"  # 0.2 with sqrt scaling (maintains 4% ratio across all budgets)
        # Review periods - EXTRA FAST for testing
        default_review_period_epochs: "1"  # ~1 minute (was ~1 week)
        default_challenge_period_epochs: "1"  # ~1 minute (was ~1 week)
        # Invitations - FAST for testing
        invitation_accountability_epochs: "10"  # ~10 minutes (was ~5 months)
        # Interim compensation - FAST for testing
        interim_deadline_epochs: "3"  # ~3 minutes (was ~1 week)
        # Interim budgets - REALISTIC for testing (in micro-DREAM)
        simple_complexity_budget: "50000000"    # 50 DREAM (50 * 1e6 micro-DREAM)
        standard_complexity_budget: "150000000"  # 150 DREAM (150 * 1e6 micro-DREAM)
        complex_complexity_budget: "400000000"   # 400 DREAM (400 * 1e6 micro-DREAM)
        expert_complexity_budget: "1000000000"   # 1000 DREAM (1000 * 1e6 micro-DREAM)
        solo_expert_bonus_rate: "0.5"  # 50% bonus for solo experts
        # Challenge response deadline - FAST for testing
        challenge_response_deadline_epochs: "1"  # ~1 minute (was ~3 days)
        # Gift rate limiting - FAST for testing
        gift_cooldown_blocks: "5"  # ~30 seconds (was ~1 day = 14400 blocks)
        max_gifts_per_sender_epoch: "2000000000"  # 2000 DREAM per epoch (same as production)
        # Jury - SMALL for testing (production: 5)
        jury_size: 3  # 3 jurors for testing (5 in production)
        min_juror_reputation: "20"  # 20 reputation (50 in production)
        # DREAM economics - TESTING overrides only
        new_member_decay_grace_epochs: "5"  # 5 epochs grace (~5 min, production: 30 ~1 month)
        # Anti-whale staking cap
        max_initiative_stake_per_member: "50000000000"  # 50,000 DREAM (same as production)
        # Anti-collusion: per-season cap on total DREAM minted via initiative completion
        max_initiative_rewards_per_season: "100000000000000"  # 100,000 DREAM (same as production)
        # Anti-grinding: per-tag per-epoch rep gain cap (raised for testing so sentinel bootstrap works)
        max_reputation_gain_per_epoch: "1000.000000000000000000"  # 1000 rep/epoch/tag (production: 50)
        # Anti-collusion: projects above this budget require council proposal approval
        large_project_budget_threshold: "10000000000"  # 10,000 DREAM (same as production)
        # Trust level configuration - using defaults
        # To modify for testing, update x/rep/types/params.go DefaultParams()
