syntax = "proto3";
package sparkdream.forum.v1;

import "sparkdream/forum/v1/types.proto";

option go_package = "sparkdream/x/forum/types";

// HideRecord defines the HideRecord message.
message HideRecord {
  uint64 post_id = 1;
  string sentinel = 2;
  int64 hidden_at = 3;
  string sentinel_bond_snapshot = 4;
  string sentinel_backing_snapshot = 5;
  string committed_amount = 6;
  ModerationReason reason_code = 7;
  string reason_text = 8;
}
