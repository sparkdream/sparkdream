syntax = "proto3";
package sparkdream.forum.v1;

option go_package = "sparkdream/x/forum/types";

// Category defines the Category message.
message Category {
  uint64 category_id = 1;
  string title = 2;
  string description = 3;
  bool members_only_write = 4;
  bool admin_only_write = 5;
  bool allow_anonymous = 6;
}
