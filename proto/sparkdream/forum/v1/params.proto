syntax = "proto3";
package sparkdream.forum.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

option go_package = "sparkdream/x/forum/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "sparkdream/x/forum/Params";
  option (gogoproto.equal) = true;

  // forum_paused stops all new posts when true
  bool forum_paused = 1;

  // moderation_paused stops all moderation actions when true
  bool moderation_paused = 2;

  // bounties_enabled allows bounty creation when true
  bool bounties_enabled = 3;

  // reactions_enabled allows upvotes/downvotes when true
  bool reactions_enabled = 4;

  // appeals_paused stops all appeals when true
  bool appeals_paused = 5;

  // editing_enabled allows post editing when true
  bool editing_enabled = 6;

  // spam_tax charged to non-members for posting
  cosmos.base.v1beta1.Coin spam_tax = 7 [(gogoproto.nullable) = false];

  // reaction_spam_tax charged to non-members for reactions
  cosmos.base.v1beta1.Coin reaction_spam_tax = 8 [(gogoproto.nullable) = false];

  // flag_spam_tax charged to non-members for flagging
  cosmos.base.v1beta1.Coin flag_spam_tax = 9 [(gogoproto.nullable) = false];

  // downvote_deposit burned when downvoting
  cosmos.base.v1beta1.Coin downvote_deposit = 10 [(gogoproto.nullable) = false];

  // appeal_fee charged for appeals
  cosmos.base.v1beta1.Coin appeal_fee = 11 [(gogoproto.nullable) = false];

  // lock_appeal_fee charged for thread lock appeals
  cosmos.base.v1beta1.Coin lock_appeal_fee = 12 [(gogoproto.nullable) = false];

  // move_appeal_fee charged for thread move appeals
  cosmos.base.v1beta1.Coin move_appeal_fee = 13 [(gogoproto.nullable) = false];

  // edit_fee charged for edits past grace period
  cosmos.base.v1beta1.Coin edit_fee = 14 [(gogoproto.nullable) = false];

  // bounty_cancellation_fee_percent percentage of bounty taken on cancellation (0-100)
  uint64 bounty_cancellation_fee_percent = 15;

  // max_content_size in bytes
  uint64 max_content_size = 16;

  // daily_post_limit per user
  uint64 daily_post_limit = 17;

  // max_reply_depth for thread nesting
  uint32 max_reply_depth = 18;

  // edit_grace_period in seconds (no fee during this time)
  int64 edit_grace_period = 19;

  // edit_max_window in seconds (cannot edit after this time)
  int64 edit_max_window = 20;

  // max_follows_per_day per user
  uint64 max_follows_per_day = 21;

  // archive_threshold in seconds (thread must be inactive this long before archiving)
  int64 archive_threshold = 22;

  // unarchive_cooldown in seconds (must wait this long after archive before unarchiving)
  int64 unarchive_cooldown = 23;

  // archive_cooldown in seconds (must wait this long after unarchive before re-archiving)
  int64 archive_cooldown = 24;

  // hide_appeal_cooldown in seconds (must wait this long after hide before appeal)
  int64 hide_appeal_cooldown = 25;

  // lock_appeal_cooldown in seconds (must wait this long after lock before appeal)
  int64 lock_appeal_cooldown = 26;

  // move_appeal_cooldown in seconds (must wait this long after move before appeal)
  int64 move_appeal_cooldown = 27;

  // cost_per_byte charged for on-chain content storage (applies to all posts, burned)
  cosmos.base.v1beta1.Coin cost_per_byte = 28 [(gogoproto.nullable) = false];

  // cost_per_byte_exempt when true, disables cost_per_byte fee collection
  bool cost_per_byte_exempt = 29;

  // ephemeral_ttl in seconds (TTL for non-member posts, default 86400 = 24h)
  int64 ephemeral_ttl = 30;

  // conviction_renewal_threshold is the minimum conviction score for TTL renewal
  string conviction_renewal_threshold = 37 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // conviction_renewal_period is the TTL extension in seconds when conviction threshold is met
  int64 conviction_renewal_period = 38;

  // ---------------------------------------------------------------------------
  // Sentinel bonded-role config (flattened).
  //
  // Forum owns the sentinel role; these fields are the source of truth and are
  // written through to x/rep's BondedRoleConfig for ROLE_TYPE_FORUM_SENTINEL on
  // change.
  // ---------------------------------------------------------------------------

  // min_sentinel_bond — see ForumOperationalParams.min_sentinel_bond.
  string min_sentinel_bond = 40;
  // min_sentinel_rep_tier — see ForumOperationalParams.min_sentinel_rep_tier.
  uint64 min_sentinel_rep_tier = 41;
  // min_sentinel_trust_level — see ForumOperationalParams.min_sentinel_trust_level.
  string min_sentinel_trust_level = 42;
  // min_sentinel_age_blocks — see ForumOperationalParams.min_sentinel_age_blocks.
  int64 min_sentinel_age_blocks = 43;
  // sentinel_demotion_cooldown — see ForumOperationalParams.sentinel_demotion_cooldown.
  int64 sentinel_demotion_cooldown = 44;
  // sentinel_demotion_threshold — see ForumOperationalParams.sentinel_demotion_threshold.
  string sentinel_demotion_threshold = 45;
}

// ForumOperationalParams defines the operational parameters that can be updated
// by the Commons Council Operations Committee without a full governance proposal.
// Governance-only fields (forum_paused, moderation_paused, appeals_paused) are
// excluded and can only be changed via MsgUpdateParams.
message ForumOperationalParams {
  option (amino.name) = "sparkdream/x/forum/ForumOperationalParams";
  option (gogoproto.equal) = true;

  // Feature toggles
  bool bounties_enabled = 1;
  bool reactions_enabled = 2;
  bool editing_enabled = 3;

  // Fees
  cosmos.base.v1beta1.Coin spam_tax = 4 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin reaction_spam_tax = 5 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin flag_spam_tax = 6 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin downvote_deposit = 7 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin appeal_fee = 8 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin lock_appeal_fee = 9 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin move_appeal_fee = 10 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin edit_fee = 11 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin cost_per_byte = 12 [(gogoproto.nullable) = false];
  bool cost_per_byte_exempt = 13;

  // Limits
  uint64 max_content_size = 14;
  uint64 daily_post_limit = 15;
  uint32 max_reply_depth = 16;
  uint64 max_follows_per_day = 17;
  uint64 bounty_cancellation_fee_percent = 18;

  // Time windows
  int64 edit_grace_period = 19;
  int64 edit_max_window = 20;
  int64 archive_threshold = 21;
  int64 unarchive_cooldown = 22;
  int64 archive_cooldown = 23;
  int64 hide_appeal_cooldown = 24;
  int64 lock_appeal_cooldown = 25;
  int64 move_appeal_cooldown = 26;
  int64 ephemeral_ttl = 27;

  // conviction_renewal_threshold is the minimum conviction score for TTL renewal
  string conviction_renewal_threshold = 31 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // conviction_renewal_period is the TTL extension in seconds when conviction threshold is met
  int64 conviction_renewal_period = 32;

  // ---------------------------------------------------------------------------
  // Sentinel bonded-role config (flattened).
  //
  // Forum owns the sentinel role; these fields are the source of truth. Any
  // update here is written through to x/rep's BondedRoleConfig for
  // ROLE_TYPE_FORUM_SENTINEL so rep can enforce the same thresholds at
  // MsgBondRole time.
  // ---------------------------------------------------------------------------

  // min_sentinel_bond is the minimum DREAM required to bond as a sentinel
  // (math.Int string, e.g. "1000").
  string min_sentinel_bond = 40;

  // min_sentinel_rep_tier is the minimum reputation tier required to bond as
  // a sentinel. 0 = no rep-tier gate.
  uint64 min_sentinel_rep_tier = 41;

  // min_sentinel_trust_level is the minimum trust level required to bond as a
  // sentinel, as an enum name (e.g. "TRUST_LEVEL_ESTABLISHED"). Empty = no
  // trust-level gate.
  string min_sentinel_trust_level = 42;

  // min_sentinel_age_blocks is enforced by forum at action time (the sentinel
  // must have been bonded for this many blocks before taking an action). Zero
  // = no age gate.
  int64 min_sentinel_age_blocks = 43;

  // sentinel_demotion_cooldown is the number of seconds a DEMOTED sentinel
  // must wait before re-bonding.
  int64 sentinel_demotion_cooldown = 44;

  // sentinel_demotion_threshold is the bond floor below which the sentinel
  // transitions from RECOVERY to DEMOTED (math.Int string).
  string sentinel_demotion_threshold = 45;
}
