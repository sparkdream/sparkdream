syntax = "proto3";
package sparkdream.forum.v1;

option go_package = "sparkdream/x/forum/types";

// SentinelActivity holds forum-specific action counters and local cooldowns
// for a sentinel. The accountability record (bond, bond status, activity
// stamps) lives in sparkdream.rep.v1.SentinelActivity.
message SentinelActivity {
  string address = 1;
  uint64 total_hides = 2;
  uint64 upheld_hides = 3;
  uint64 overturned_hides = 4;
  uint64 unchallenged_hides = 5;
  uint64 epoch_hides = 6;
  uint64 epoch_appeals_resolved = 7;
  int64 overturn_cooldown_until = 8;
  uint64 consecutive_overturns = 9;
  uint64 pending_hide_count = 10;
  uint64 consecutive_upheld = 11;
  uint64 epoch_appeals_filed = 12;
  uint64 total_locks = 13;
  uint64 upheld_locks = 14;
  uint64 overturned_locks = 15;
  uint64 epoch_locks = 16;
  uint64 total_moves = 17;
  uint64 upheld_moves = 18;
  uint64 overturned_moves = 19;
  uint64 epoch_moves = 20;
  uint64 total_pins = 21;
  uint64 upheld_pins = 22;
  uint64 overturned_pins = 23;
  uint64 epoch_pins = 24;
  uint64 total_proposals = 25;
  uint64 confirmed_proposals = 26;
  uint64 rejected_proposals = 27;
  uint64 epoch_curations = 28;
}
