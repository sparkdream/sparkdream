syntax = "proto3";

package sparkdream.forum.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "sparkdream/forum/v1/archive_metadata.proto";
import "sparkdream/forum/v1/bounty.proto";
import "sparkdream/forum/v1/hide_record.proto";
import "sparkdream/forum/v1/params.proto";
import "sparkdream/forum/v1/post.proto";
import "sparkdream/forum/v1/post_flag.proto";
import "sparkdream/forum/v1/sentinel_activity.proto";
import "sparkdream/forum/v1/thread_follow.proto";
import "sparkdream/forum/v1/thread_follow_count.proto";
import "sparkdream/forum/v1/thread_lock_record.proto";
import "sparkdream/forum/v1/thread_metadata.proto";
import "sparkdream/forum/v1/thread_move_record.proto";
import "sparkdream/forum/v1/user_rate_limit.proto";
import "sparkdream/forum/v1/user_reaction_limit.proto";

option go_package = "sparkdream/x/forum/types";

// GenesisState defines the forum module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Post post_map = 2 [(gogoproto.nullable) = false];
  repeated UserRateLimit user_rate_limit_map = 3 [(gogoproto.nullable) = false];
  repeated UserReactionLimit user_reaction_limit_map = 4 [(gogoproto.nullable) = false];
  repeated SentinelActivity sentinel_activity_map = 5 [(gogoproto.nullable) = false];
  repeated HideRecord hide_record_map = 6 [(gogoproto.nullable) = false];
  repeated ThreadLockRecord thread_lock_record_map = 7 [(gogoproto.nullable) = false];
  repeated ThreadMoveRecord thread_move_record_map = 8 [(gogoproto.nullable) = false];
  repeated PostFlag post_flag_map = 9 [(gogoproto.nullable) = false];
  repeated Bounty bounty_list = 10 [(gogoproto.nullable) = false];
  uint64 bounty_count = 11;
  repeated ThreadMetadata thread_metadata_map = 12 [(gogoproto.nullable) = false];
  repeated ThreadFollow thread_follow_map = 13 [(gogoproto.nullable) = false];
  repeated ThreadFollowCount thread_follow_count_map = 14 [(gogoproto.nullable) = false];
  repeated ArchiveMetadata archive_metadata_map = 15 [(gogoproto.nullable) = false];
}
