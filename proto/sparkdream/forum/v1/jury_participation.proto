syntax = "proto3";
package sparkdream.forum.v1;

option go_package = "sparkdream/x/forum/types";

// JuryParticipation defines the JuryParticipation message.
message JuryParticipation {
  string juror = 1;
  uint64 total_assigned = 2;
  uint64 total_voted = 3;
  uint64 total_timeouts = 4;
  int64 last_assigned_at = 5;
  bool excluded = 6;
}
