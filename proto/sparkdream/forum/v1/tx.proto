// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // UpdateOperationalParams defines an operation for updating the module's
  // operational parameters. Authorized for Commons Council Operations Committee.
  rpc UpdateOperationalParams(MsgUpdateOperationalParams) returns (MsgUpdateOperationalParamsResponse);

  // CreatePost defines the CreatePost RPC.
  rpc CreatePost(MsgCreatePost) returns (MsgCreatePostResponse);

  // EditPost defines the EditPost RPC.
  rpc EditPost(MsgEditPost) returns (MsgEditPostResponse);

  // DeletePost defines the DeletePost RPC.
  rpc DeletePost(MsgDeletePost) returns (MsgDeletePostResponse);

  // FreezeThread defines the FreezeThread RPC.
  rpc FreezeThread(MsgFreezeThread) returns (MsgFreezeThreadResponse);

  // UnarchiveThread defines the UnarchiveThread RPC.
  rpc UnarchiveThread(MsgUnarchiveThread) returns (MsgUnarchiveThreadResponse);

  // PinPost defines the PinPost RPC.
  rpc PinPost(MsgPinPost) returns (MsgPinPostResponse);

  // UnpinPost defines the UnpinPost RPC.
  rpc UnpinPost(MsgUnpinPost) returns (MsgUnpinPostResponse);

  // LockThread defines the LockThread RPC.
  rpc LockThread(MsgLockThread) returns (MsgLockThreadResponse);

  // UnlockThread defines the UnlockThread RPC.
  rpc UnlockThread(MsgUnlockThread) returns (MsgUnlockThreadResponse);

  // MoveThread defines the MoveThread RPC.
  rpc MoveThread(MsgMoveThread) returns (MsgMoveThreadResponse);

  // FollowThread defines the FollowThread RPC.
  rpc FollowThread(MsgFollowThread) returns (MsgFollowThreadResponse);

  // UnfollowThread defines the UnfollowThread RPC.
  rpc UnfollowThread(MsgUnfollowThread) returns (MsgUnfollowThreadResponse);

  // UpvotePost defines the UpvotePost RPC.
  rpc UpvotePost(MsgUpvotePost) returns (MsgUpvotePostResponse);

  // DownvotePost defines the DownvotePost RPC.
  rpc DownvotePost(MsgDownvotePost) returns (MsgDownvotePostResponse);

  // FlagPost defines the FlagPost RPC.
  rpc FlagPost(MsgFlagPost) returns (MsgFlagPostResponse);

  // DismissFlags defines the DismissFlags RPC.
  rpc DismissFlags(MsgDismissFlags) returns (MsgDismissFlagsResponse);

  // HidePost defines the HidePost RPC.
  rpc HidePost(MsgHidePost) returns (MsgHidePostResponse);

  // AppealPost defines the AppealPost RPC.
  rpc AppealPost(MsgAppealPost) returns (MsgAppealPostResponse);

  // AppealThreadLock defines the AppealThreadLock RPC.
  rpc AppealThreadLock(MsgAppealThreadLock) returns (MsgAppealThreadLockResponse);

  // AppealThreadMove defines the AppealThreadMove RPC.
  rpc AppealThreadMove(MsgAppealThreadMove) returns (MsgAppealThreadMoveResponse);

  // CreateBounty defines the CreateBounty RPC.
  rpc CreateBounty(MsgCreateBounty) returns (MsgCreateBountyResponse);

  // AwardBounty defines the AwardBounty RPC.
  rpc AwardBounty(MsgAwardBounty) returns (MsgAwardBountyResponse);

  // IncreaseBounty defines the IncreaseBounty RPC.
  rpc IncreaseBounty(MsgIncreaseBounty) returns (MsgIncreaseBountyResponse);

  // CancelBounty defines the CancelBounty RPC.
  rpc CancelBounty(MsgCancelBounty) returns (MsgCancelBountyResponse);

  // AssignBountyToReply defines the AssignBountyToReply RPC.
  rpc AssignBountyToReply(MsgAssignBountyToReply) returns (MsgAssignBountyToReplyResponse);

  // PinReply defines the PinReply RPC.
  rpc PinReply(MsgPinReply) returns (MsgPinReplyResponse);

  // UnpinReply defines the UnpinReply RPC.
  rpc UnpinReply(MsgUnpinReply) returns (MsgUnpinReplyResponse);

  // DisputePin defines the DisputePin RPC.
  rpc DisputePin(MsgDisputePin) returns (MsgDisputePinResponse);

  // MarkAcceptedReply defines the MarkAcceptedReply RPC.
  rpc MarkAcceptedReply(MsgMarkAcceptedReply) returns (MsgMarkAcceptedReplyResponse);

  // ConfirmProposedReply defines the ConfirmProposedReply RPC.
  rpc ConfirmProposedReply(MsgConfirmProposedReply) returns (MsgConfirmProposedReplyResponse);

  // RejectProposedReply defines the RejectProposedReply RPC.
  rpc RejectProposedReply(MsgRejectProposedReply) returns (MsgRejectProposedReplyResponse);

  // SetForumPaused defines the SetForumPaused RPC.
  rpc SetForumPaused(MsgSetForumPaused) returns (MsgSetForumPausedResponse);

  // SetModerationPaused defines the SetModerationPaused RPC.
  rpc SetModerationPaused(MsgSetModerationPaused) returns (MsgSetModerationPausedResponse);

  // BondSentinel defines the BondSentinel RPC.
  rpc BondSentinel(MsgBondSentinel) returns (MsgBondSentinelResponse);

  // UnbondSentinel defines the UnbondSentinel RPC.
  rpc UnbondSentinel(MsgUnbondSentinel) returns (MsgUnbondSentinelResponse);

  // ReportMember defines the ReportMember RPC.
  rpc ReportMember(MsgReportMember) returns (MsgReportMemberResponse);

  // CosignMemberReport defines the CosignMemberReport RPC.
  rpc CosignMemberReport(MsgCosignMemberReport) returns (MsgCosignMemberReportResponse);

  // ResolveMemberReport defines the ResolveMemberReport RPC.
  rpc ResolveMemberReport(MsgResolveMemberReport) returns (MsgResolveMemberReportResponse);

  // DefendMemberReport defines the DefendMemberReport RPC.
  rpc DefendMemberReport(MsgDefendMemberReport) returns (MsgDefendMemberReportResponse);

  // AppealGovAction defines the AppealGovAction RPC.
  rpc AppealGovAction(MsgAppealGovAction) returns (MsgAppealGovActionResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/forum/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgUpdateOperationalParams is the Msg/UpdateOperationalParams request type.
// Authorized: Commons Council Operations Committee (via IsCouncilAuthorized).
message MsgUpdateOperationalParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/forum/MsgUpdateOperationalParams";

  // authority is the address authorized to update operational params.
  // Can be: governance authority, Commons Council policy address,
  // or Commons Operations Committee member.
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // operational_params defines the operational parameters to update.
  // NOTE: All operational parameters must be supplied.
  ForumOperationalParams operational_params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateOperationalParamsResponse defines the response structure for executing a
// MsgUpdateOperationalParams message.
message MsgUpdateOperationalParamsResponse {}

