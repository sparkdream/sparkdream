syntax = "proto3";

package sparkdream.collect.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sparkdream/collect/v1/params.proto";
import "sparkdream/collect/v1/types.proto";
import "sparkdream/common/v1/moderation_reason.proto";

option go_package = "sparkdream/x/collect/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc CreateCollection(MsgCreateCollection) returns (MsgCreateCollectionResponse);
  rpc UpdateCollection(MsgUpdateCollection) returns (MsgUpdateCollectionResponse);
  rpc DeleteCollection(MsgDeleteCollection) returns (MsgDeleteCollectionResponse);
  rpc AddItem(MsgAddItem) returns (MsgAddItemResponse);
  rpc AddItems(MsgAddItems) returns (MsgAddItemsResponse);
  rpc UpdateItem(MsgUpdateItem) returns (MsgUpdateItemResponse);
  rpc RemoveItem(MsgRemoveItem) returns (MsgRemoveItemResponse);
  rpc RemoveItems(MsgRemoveItems) returns (MsgRemoveItemsResponse);
  rpc ReorderItem(MsgReorderItem) returns (MsgReorderItemResponse);
  rpc AddCollaborator(MsgAddCollaborator) returns (MsgAddCollaboratorResponse);
  rpc RemoveCollaborator(MsgRemoveCollaborator) returns (MsgRemoveCollaboratorResponse);
  rpc UpdateCollaboratorRole(MsgUpdateCollaboratorRole) returns (MsgUpdateCollaboratorRoleResponse);
  rpc RegisterCurator(MsgRegisterCurator) returns (MsgRegisterCuratorResponse);
  rpc UnregisterCurator(MsgUnregisterCurator) returns (MsgUnregisterCuratorResponse);
  rpc RateCollection(MsgRateCollection) returns (MsgRateCollectionResponse);
  rpc ChallengeReview(MsgChallengeReview) returns (MsgChallengeReviewResponse);
  rpc RequestSponsorship(MsgRequestSponsorship) returns (MsgRequestSponsorshipResponse);
  rpc CancelSponsorshipRequest(MsgCancelSponsorshipRequest) returns (MsgCancelSponsorshipRequestResponse);
  rpc SponsorCollection(MsgSponsorCollection) returns (MsgSponsorCollectionResponse);
  rpc UpdateOperationalParams(MsgUpdateOperationalParams) returns (MsgUpdateOperationalParamsResponse);

  // UpvoteContent defines the UpvoteContent RPC.
  rpc UpvoteContent(MsgUpvoteContent) returns (MsgUpvoteContentResponse);

  // DownvoteContent defines the DownvoteContent RPC.
  rpc DownvoteContent(MsgDownvoteContent) returns (MsgDownvoteContentResponse);

  // FlagContent defines the FlagContent RPC.
  rpc FlagContent(MsgFlagContent) returns (MsgFlagContentResponse);

  // HideContent defines the HideContent RPC.
  rpc HideContent(MsgHideContent) returns (MsgHideContentResponse);

  // AppealHide defines the AppealHide RPC.
  rpc AppealHide(MsgAppealHide) returns (MsgAppealHideResponse);

  // EndorseCollection defines the EndorseCollection RPC.
  rpc EndorseCollection(MsgEndorseCollection) returns (MsgEndorseCollectionResponse);

  // SetSeekingEndorsement defines the SetSeekingEndorsement RPC.
  rpc SetSeekingEndorsement(MsgSetSeekingEndorsement) returns (MsgSetSeekingEndorsementResponse);

  // PinCollection makes an ephemeral collection permanent by burning its deposits.
  rpc PinCollection(MsgPinCollection) returns (MsgPinCollectionResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/collect/MsgUpdateParams";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message MsgUpdateParamsResponse {}

message MsgCreateCollection {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  CollectionType type = 2;
  Visibility visibility = 3;
  bool encrypted = 4;
  int64 expires_at = 5;
  string name = 6;
  string description = 7;
  string cover_uri = 8;
  repeated string tags = 9;
  bytes encrypted_data = 10;
  string author_bond = 11 [ // Optional DREAM amount to lock as author bond
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = true
  ];
  uint64 initiative_id = 12; // Optional x/rep initiative to link for conviction propagation
}

message MsgCreateCollectionResponse {
  uint64 id = 1;
}

message MsgUpdateCollection {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
  CollectionType type = 3;
  int64 expires_at = 4;
  string name = 5;
  string description = 6;
  string cover_uri = 7;
  repeated string tags = 8;
  bytes encrypted_data = 9;
  bool community_feedback_enabled = 10;
  bool update_community_feedback = 11; // true to apply community_feedback_enabled
}

message MsgUpdateCollectionResponse {}

message MsgDeleteCollection {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
}

message MsgDeleteCollectionResponse {}

message MsgAddItem {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
  uint64 position = 3;
  string title = 4;
  string description = 5;
  string image_uri = 6;
  ReferenceType reference_type = 7;
  NftReference nft = 8;
  LinkReference link = 9;
  OnChainReference on_chain = 10;
  CustomReference custom = 11;
  repeated KeyValuePair attributes = 12;
  bytes encrypted_data = 13;
}

message MsgAddItemResponse {
  uint64 id = 1;
}

message MsgAddItems {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
  repeated AddItemEntry items = 3 [(gogoproto.nullable) = false];
}

message MsgAddItemsResponse {
  repeated uint64 ids = 1;
}

message MsgUpdateItem {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
  string title = 3;
  string description = 4;
  string image_uri = 5;
  ReferenceType reference_type = 6;
  NftReference nft = 7;
  LinkReference link = 8;
  OnChainReference on_chain = 9;
  CustomReference custom = 10;
  repeated KeyValuePair attributes = 11;
  bytes encrypted_data = 12;
}

message MsgUpdateItemResponse {}

message MsgRemoveItem {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
}

message MsgRemoveItemResponse {}

message MsgRemoveItems {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated uint64 ids = 2;
}

message MsgRemoveItemsResponse {}

message MsgReorderItem {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
  uint64 new_position = 3;
}

message MsgReorderItemResponse {}

message MsgAddCollaborator {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
  string address = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  CollaboratorRole role = 4;
}

message MsgAddCollaboratorResponse {}

message MsgRemoveCollaborator {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
  string address = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgRemoveCollaboratorResponse {}

message MsgUpdateCollaboratorRole {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
  string address = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  CollaboratorRole role = 4;
}

message MsgUpdateCollaboratorRoleResponse {}

message MsgRegisterCurator {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string bond_amount = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

message MsgRegisterCuratorResponse {}

message MsgUnregisterCurator {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgUnregisterCuratorResponse {}

message MsgRateCollection {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
  CurationVerdict verdict = 3;
  repeated string tags = 4;
  string comment = 5;
}

message MsgRateCollectionResponse {
  uint64 review_id = 1;
}

message MsgChallengeReview {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 review_id = 2;
  string reason = 3;
}

message MsgChallengeReviewResponse {}

message MsgRequestSponsorship {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
}

message MsgRequestSponsorshipResponse {}

message MsgCancelSponsorshipRequest {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
}

message MsgCancelSponsorshipRequestResponse {}

message MsgSponsorCollection {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
}

message MsgSponsorCollectionResponse {}

message MsgUpdateOperationalParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/collect/MsgUpdateOperationalParams";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  CollectOperationalParams operational_params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message MsgUpdateOperationalParamsResponse {}

// MsgUpvoteContent defines the MsgUpvoteContent message.
message MsgUpvoteContent {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 target_id = 2;
  FlagTargetType target_type = 3;
}

// MsgUpvoteContentResponse defines the MsgUpvoteContentResponse message.
message MsgUpvoteContentResponse {}

// MsgDownvoteContent defines the MsgDownvoteContent message.
message MsgDownvoteContent {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 target_id = 2;
  FlagTargetType target_type = 3;
}

// MsgDownvoteContentResponse defines the MsgDownvoteContentResponse message.
message MsgDownvoteContentResponse {}

// MsgFlagContent defines the MsgFlagContent message.
message MsgFlagContent {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 target_id = 2;
  FlagTargetType target_type = 3;
  sparkdream.common.v1.ModerationReason reason = 4;
  string reason_text = 5;
}

// MsgFlagContentResponse defines the MsgFlagContentResponse message.
message MsgFlagContentResponse {}

// MsgHideContent defines the MsgHideContent message.
message MsgHideContent {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 target_id = 2;
  FlagTargetType target_type = 3;
  sparkdream.common.v1.ModerationReason reason_code = 4;
  string reason_text = 5;
}

// MsgHideContentResponse defines the MsgHideContentResponse message.
message MsgHideContentResponse {
  uint64 hide_record_id = 1;
}

// MsgAppealHide defines the MsgAppealHide message.
message MsgAppealHide {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 hide_record_id = 2;
}

// MsgAppealHideResponse defines the MsgAppealHideResponse message.
message MsgAppealHideResponse {}

// MsgEndorseCollection defines the MsgEndorseCollection message.
message MsgEndorseCollection {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
}

// MsgEndorseCollectionResponse defines the MsgEndorseCollectionResponse message.
message MsgEndorseCollectionResponse {}

// MsgSetSeekingEndorsement defines the MsgSetSeekingEndorsement message.
message MsgSetSeekingEndorsement {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
  bool seeking = 3;
}

// MsgSetSeekingEndorsementResponse defines the MsgSetSeekingEndorsementResponse message.
message MsgSetSeekingEndorsementResponse {}

// MsgPinCollection makes an ephemeral collection permanent by burning its deposits.
message MsgPinCollection {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 collection_id = 2;
}

message MsgPinCollectionResponse {}
