syntax = "proto3";
package sparkdream.blog.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";

option go_package = "sparkdream/x/blog/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "sparkdream/x/blog/Params";
  option (gogoproto.equal) = true;

  // Maximum length for post titles
  uint64 max_title_length = 1;

  // Maximum length for post bodies
  uint64 max_body_length = 2;

  // cost_per_byte charged for on-chain content storage (applies to all posts, burned)
  cosmos.base.v1beta1.Coin cost_per_byte = 3 [(gogoproto.nullable) = false];

  // cost_per_byte_exempt when true, disables cost_per_byte fee collection
  bool cost_per_byte_exempt = 4;
}

// BlogOperationalParams defines the operational parameters that can be updated
// by the Commons Council Operations Committee without a full governance proposal.
message BlogOperationalParams {
  option (amino.name) = "sparkdream/x/blog/BlogOperationalParams";
  option (gogoproto.equal) = true;

  // cost_per_byte charged for on-chain content storage (applies to all posts, burned)
  cosmos.base.v1beta1.Coin cost_per_byte = 1 [(gogoproto.nullable) = false];

  // cost_per_byte_exempt when true, disables cost_per_byte fee collection
  bool cost_per_byte_exempt = 2;
}
