  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
}

// MsgHidePostResponse defines the MsgHidePostResponse message.
message MsgHidePostResponse {}

// MsgUnhidePost defines the MsgUnhidePost message.
message MsgUnhidePost {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
}

// MsgUnhidePostResponse defines the MsgUnhidePostResponse message.
message MsgUnhidePostResponse {}

// MsgCreateReply defines the MsgCreateReply message.
message MsgCreateReply {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 post_id = 2;
  uint64 parent_reply_id = 3;
  string body = 4;
  sparkdream.common.v1.ContentType content_type = 5;
  string author_bond = 6 [           // Optional DREAM amount to lock as author bond
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = true
  ];
}

// MsgCreateReplyResponse defines the MsgCreateReplyResponse message.
message MsgCreateReplyResponse {
  uint64 id = 1;
}

// MsgUpdateReply defines the MsgUpdateReply message.
message MsgUpdateReply {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 2;
  string body = 3;
  sparkdream.common.v1.ContentType content_type = 4;
}

// MsgUpdateReplyResponse defines the MsgUpdateReplyResponse message.
