syntax = "proto3";

package sparkdream.blog.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sparkdream/blog/v1/params.proto";
import "sparkdream/blog/v1/types.proto";
import "sparkdream/common/v1/content_type.proto";

option go_package = "sparkdream/x/blog/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // UpdateOperationalParams defines an operation for updating the module's
  // operational parameters. Authorized for Commons Council Operations Committee.
  rpc UpdateOperationalParams(MsgUpdateOperationalParams) returns (MsgUpdateOperationalParamsResponse);

  // CreatePost creates a new blog post.
  rpc CreatePost(MsgCreatePost) returns (MsgCreatePostResponse);

  // UpdatePost updates an existing blog post (full replacement).
  rpc UpdatePost(MsgUpdatePost) returns (MsgUpdatePostResponse);

  // DeletePost tombstones a post (clears content, preserves structure).
  rpc DeletePost(MsgDeletePost) returns (MsgDeletePostResponse);

  // HidePost hides a post (author self-moderation).
  rpc HidePost(MsgHidePost) returns (MsgHidePostResponse);

  // UnhidePost restores a previously hidden post.
  rpc UnhidePost(MsgUnhidePost) returns (MsgUnhidePostResponse);

  // CreateReply creates a threaded reply to a blog post.
  rpc CreateReply(MsgCreateReply) returns (MsgCreateReplyResponse);

  // UpdateReply updates an existing reply.
  rpc UpdateReply(MsgUpdateReply) returns (MsgUpdateReplyResponse);

  // DeleteReply tombstones a reply.
  rpc DeleteReply(MsgDeleteReply) returns (MsgDeleteReplyResponse);

  // HideReply hides a reply (post author moderation).
  rpc HideReply(MsgHideReply) returns (MsgHideReplyResponse);

  // UnhideReply restores a previously hidden reply.
  rpc UnhideReply(MsgUnhideReply) returns (MsgUnhideReplyResponse);

  // React adds or changes a reaction on a post or reply.
  rpc React(MsgReact) returns (MsgReactResponse);

  // RemoveReaction removes your reaction from a post or reply.
  rpc RemoveReaction(MsgRemoveReaction) returns (MsgRemoveReactionResponse);

  // PinPost pins an ephemeral post, making it permanent.
  rpc PinPost(MsgPinPost) returns (MsgPinPostResponse);

  // PinReply pins an ephemeral reply, making it permanent.
  rpc PinReply(MsgPinReply) returns (MsgPinReplyResponse);

  // CreateAnonymousPost creates a post with ZK proof of membership.
  rpc CreateAnonymousPost(MsgCreateAnonymousPost) returns (MsgCreateAnonymousPostResponse);

  // CreateAnonymousReply creates a reply with ZK proof of membership.
  rpc CreateAnonymousReply(MsgCreateAnonymousReply) returns (MsgCreateAnonymousReplyResponse);

  // AnonymousReact adds a reaction to a post or reply with ZK proof of membership.
  rpc AnonymousReact(MsgAnonymousReact) returns (MsgAnonymousReactResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/blog/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgUpdateOperationalParams is the Msg/UpdateOperationalParams request type.
// Authorized: Commons Council Operations Committee (via IsCouncilAuthorized).
message MsgUpdateOperationalParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/blog/MsgUpdateOperationalParams";

  // authority is the address authorized to update operational params.
  // Can be: governance authority, Commons Council policy address,
  // or Commons Operations Committee member.
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // operational_params defines the operational parameters to update.
  // NOTE: All operational parameters must be supplied.
  BlogOperationalParams operational_params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateOperationalParamsResponse defines the response structure for executing a
// MsgUpdateOperationalParams message.
message MsgUpdateOperationalParamsResponse {}

// MsgCreatePost defines the MsgCreatePost message.
message MsgCreatePost {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string title = 2;
  string body = 3;
  sparkdream.common.v1.ContentType content_type = 4;
  int32 min_reply_trust_level = 5;  // Minimum trust level to reply (-1 to 4, default: 0)
  string author_bond = 6 [           // Optional DREAM amount to lock as author bond
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = true
  ];
  uint64 initiative_id = 7;          // Optional: reference an x/rep initiative (0 = none, immutable)
}

// MsgCreatePostResponse defines the MsgCreatePostResponse message.
message MsgCreatePostResponse {
  uint64 id = 1;
}

// MsgUpdatePost defines the MsgUpdatePost message.
message MsgUpdatePost {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string title = 2;
  string body = 3;
  uint64 id = 4;
  sparkdream.common.v1.ContentType content_type = 5;
  bool replies_enabled = 6;
  int32 min_reply_trust_level = 7;  // Minimum trust level to reply (-1 to 4)
}

// MsgUpdatePostResponse defines the MsgUpdatePostResponse message.
message MsgUpdatePostResponse {}

