// MsgCreateAnonymousPost defines the MsgCreateAnonymousPost message.
message MsgCreateAnonymousPost {
  option (cosmos.msg.v1.signer) = "submitter";
  string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string title = 2;
  string body = 3;
  sparkdream.common.v1.ContentType content_type = 4;
  bytes proof = 5;               // ZK proof bytes
  bytes nullifier = 6;           // 32-byte nullifier
  bytes merkle_root = 7;         // Trust tree root
  uint32 min_trust_level = 8;    // Proven minimum trust level
}

// MsgCreateAnonymousPostResponse defines the MsgCreateAnonymousPostResponse message.
message MsgCreateAnonymousPostResponse {
  uint64 id = 1;
}

// MsgCreateAnonymousReply defines the MsgCreateAnonymousReply message.
