syntax = "proto3";

package sparkdream.commons.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "sparkdream/commons/v1/extended_group.proto";
import "sparkdream/commons/v1/params.proto";
import "sparkdream/commons/v1/policy_permissions.proto";

option go_package = "sparkdream/x/commons/types";

// GenesisState defines the commons module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated PolicyPermissions policy_permissions_map = 2 [(gogoproto.nullable) = false];
  repeated ExtendedGroup extended_group_map = 3 [(gogoproto.nullable) = false];
}
