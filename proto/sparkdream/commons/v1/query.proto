syntax = "proto3";

package sparkdream.commons.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "sparkdream/commons/v1/group.proto";
import "sparkdream/commons/v1/params.proto";
import "sparkdream/commons/v1/policy_permissions.proto";

option go_package = "sparkdream/x/commons/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/params";
  }

  // ListPolicyPermissions Queries a list of PolicyPermissions items.
  rpc GetPolicyPermissions(QueryGetPolicyPermissionsRequest) returns (QueryGetPolicyPermissionsResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/policy_permissions/{policy_address}";
  }

  // ListPolicyPermissions defines the ListPolicyPermissions RPC.
  rpc ListPolicyPermissions(QueryAllPolicyPermissionsRequest) returns (QueryAllPolicyPermissionsResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/policy_permissions";
  }

  // GetGroup queries a specific group by name.
  rpc GetGroup(QueryGetGroupRequest) returns (QueryGetGroupResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/group/{index}";
  }

  // ListGroups queries all groups.
  rpc ListGroups(QueryAllGroupRequest) returns (QueryAllGroupResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/group";
  }

  // GetCouncilMembers queries the members of a specific council.
  rpc GetCouncilMembers(QueryGetCouncilMembersRequest) returns (QueryGetCouncilMembersResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/council_members/{council_name}";
  }

  // GetProposal queries a specific proposal by ID.
  rpc GetProposal(QueryGetProposalRequest) returns (QueryGetProposalResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/proposal/{proposal_id}";
  }

  // ListProposals queries all proposals with optional filtering.
  rpc ListProposals(QueryListProposalsRequest) returns (QueryListProposalsResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/proposals";
  }

  // GetProposalVotes queries votes for a specific proposal.
  rpc GetProposalVotes(QueryGetProposalVotesRequest) returns (QueryGetProposalVotesResponse) {
    option (google.api.http).get = "/sparkdream/commons/v1/proposal/{proposal_id}/votes";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// QueryGetPolicyPermissionsRequest defines the QueryGetPolicyPermissionsRequest message.
message QueryGetPolicyPermissionsRequest {
  string policy_address = 1;
}

// QueryGetPolicyPermissionsResponse defines the QueryGetPolicyPermissionsResponse message.
message QueryGetPolicyPermissionsResponse {
  PolicyPermissions policy_permissions = 1 [(gogoproto.nullable) = false];
}

// QueryAllPolicyPermissionsRequest defines the QueryAllPolicyPermissionsRequest message.
message QueryAllPolicyPermissionsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryAllPolicyPermissionsResponse defines the QueryAllPolicyPermissionsResponse message.
message QueryAllPolicyPermissionsResponse {
  repeated PolicyPermissions policy_permissions = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryGetGroupRequest queries a specific group by name.
message QueryGetGroupRequest {
  string index = 1;
}

// QueryGetGroupResponse returns a group.
message QueryGetGroupResponse {
  Group group = 1 [(gogoproto.nullable) = false];
}

// QueryAllGroupRequest queries all groups.
message QueryAllGroupRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryAllGroupResponse returns all groups.
message QueryAllGroupResponse {
  repeated Group group = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryGetCouncilMembersRequest queries the members of a council.
message QueryGetCouncilMembersRequest {
  string council_name = 1;
}

// QueryGetCouncilMembersResponse returns the members of a council.
message QueryGetCouncilMembersResponse {
  repeated Member members = 1 [(gogoproto.nullable) = false];
}

// QueryGetProposalRequest queries a specific proposal.
message QueryGetProposalRequest {
  uint64 proposal_id = 1;
}

// QueryGetProposalResponse returns a proposal.
message QueryGetProposalResponse {
  Proposal proposal = 1 [(gogoproto.nullable) = false];
  repeated Vote votes = 2 [(gogoproto.nullable) = false];
  TallyResult tally = 3 [(gogoproto.nullable) = false];
}

// QueryListProposalsRequest queries all proposals with optional council filter.
message QueryListProposalsRequest {
  // Optional filter by council name
  string council_name = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryListProposalsResponse returns a list of proposals.
message QueryListProposalsResponse {
  repeated Proposal proposals = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryGetProposalVotesRequest queries votes for a proposal.
message QueryGetProposalVotesRequest {
  uint64 proposal_id = 1;
}

// QueryGetProposalVotesResponse returns votes for a proposal.
message QueryGetProposalVotesResponse {
  repeated Vote votes = 1 [(gogoproto.nullable) = false];
  TallyResult tally = 2 [(gogoproto.nullable) = false];
}
