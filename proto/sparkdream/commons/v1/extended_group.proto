syntax = "proto3";
package sparkdream.commons.v1;

option go_package = "sparkdream/x/commons/types";

// ExtendedGroup defines the ExtendedGroup message.
message ExtendedGroup {
  string index = 1;
  uint64 group_id = 2;
  string policy_address = 3;
  string parent_policy_address = 4;
  string electoral_policy_address = 5;
  uint64 funding_weight = 6;
  string max_spend_per_epoch = 7;
  int64 update_cooldown = 8;
  bool futarchy_enabled = 9;
  string futarchy_member_address = 10;
  uint64 min_members = 11;
  uint64 max_members = 12;
  int64 term_duration = 13;
  int64 current_term_expiration = 14;
  int64 activation_time = 15;
  int64 last_parent_update = 16;
}
