syntax = "proto3";

package sparkdream.commons.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/any.proto";
import "sparkdream/commons/v1/group.proto";
import "sparkdream/commons/v1/params.proto";

option go_package = "sparkdream/x/commons/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // SpendFromCommons defines a method for the council to spend funds.
  rpc SpendFromCommons(MsgSpendFromCommons) returns (MsgSpendFromCommonsResponse);

  // EmergencyCancelGovProposal defines a method for the council to kill a proposal.
  rpc EmergencyCancelGovProposal(MsgEmergencyCancelGovProposal) returns (MsgEmergencyCancelGovProposalResponse);

  // CreatePolicyPermissions defines the CreatePolicyPermissions RPC.
  rpc CreatePolicyPermissions(MsgCreatePolicyPermissions) returns (MsgCreatePolicyPermissionsResponse);

  // UpdatePolicyPermissions defines the UpdatePolicyPermissions RPC.
  rpc UpdatePolicyPermissions(MsgUpdatePolicyPermissions) returns (MsgUpdatePolicyPermissionsResponse);

  // DeletePolicyPermissions defines the DeletePolicyPermissions RPC.
  rpc DeletePolicyPermissions(MsgDeletePolicyPermissions) returns (MsgDeletePolicyPermissionsResponse);

  // RegisterGroup defines the RegisterGroup RPC.
  rpc RegisterGroup(MsgRegisterGroup) returns (MsgRegisterGroupResponse);

  // RenewGroup defines the RenewGroup RPC.
  rpc RenewGroup(MsgRenewGroup) returns (MsgRenewGroupResponse);

  // UpdateGroupMembers defines the UpdateGroupMembers RPC.
  rpc UpdateGroupMembers(MsgUpdateGroupMembers) returns (MsgUpdateGroupMembersResponse);

  // UpdateGroupConfig defines the UpdateGroupConfig RPC.
  rpc UpdateGroupConfig(MsgUpdateGroupConfig) returns (MsgUpdateGroupConfigResponse);

  // ForceUpgrade defines the ForceUpgrade RPC.
  rpc ForceUpgrade(MsgForceUpgrade) returns (MsgForceUpgradeResponse);

  // DeleteGroup defines the DeleteGroup RPC.
  rpc DeleteGroup(MsgDeleteGroup) returns (MsgDeleteGroupResponse);

  // VetoGroupProposals defines the VetoGroupProposals RPC.
  rpc VetoGroupProposals(MsgVetoGroupProposals) returns (MsgVetoGroupProposalsResponse);

  // SubmitProposal submits a new proposal to a council for voting.
  rpc SubmitProposal(MsgSubmitProposal) returns (MsgSubmitProposalResponse);

  // VoteProposal casts a vote on an active proposal.
  rpc VoteProposal(MsgVoteProposal) returns (MsgVoteProposalResponse);

  // ExecuteProposal executes an accepted proposal.
  rpc ExecuteProposal(MsgExecuteProposal) returns (MsgExecuteProposalResponse);

  // SubmitAnonymousProposal creates a proposal through the x/shield module.
  // The proposer must be the shield module account (verified by shield ZK proof).
  rpc SubmitAnonymousProposal(MsgSubmitAnonymousProposal) returns (MsgSubmitAnonymousProposalResponse);

  // AnonymousVoteProposal casts an anonymous vote on a proposal through x/shield.
  // The voter must be the shield module account (verified by shield ZK proof).
  rpc AnonymousVoteProposal(MsgAnonymousVoteProposal) returns (MsgAnonymousVoteProposalResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/commons/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgSpendFromCommons defines the MsgSpendFromCommons message.
message MsgSpendFromCommons {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/commons/MsgSpendFromCommons";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string recipient = 2;
  repeated cosmos.base.v1beta1.Coin amount = 3 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
}

// MsgSpendFromCommonsResponse defines the MsgSpendFromCommonsResponse message.
message MsgSpendFromCommonsResponse {}

// MsgEmergencyCancelGovProposal defines the MsgEmergencyCancelGovProposal message.
message MsgEmergencyCancelGovProposal {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/commons/MsgEmergencyCancelGovProposal";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 proposal_id = 2;
}

// MsgEmergencyCancelGovProposalResponse defines the MsgEmergencyCancelGovProposalResponse message.
message MsgEmergencyCancelGovProposalResponse {}

// MsgCreatePolicyPermissions defines the MsgCreatePolicyPermissions message.
message MsgCreatePolicyPermissions {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string policy_address = 2;
  repeated string allowed_messages = 3;
}

// MsgCreatePolicyPermissionsResponse defines the MsgCreatePolicyPermissionsResponse message.
message MsgCreatePolicyPermissionsResponse {}

// MsgUpdatePolicyPermissions defines the MsgUpdatePolicyPermissions message.
message MsgUpdatePolicyPermissions {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string policy_address = 2;
  repeated string allowed_messages = 3;
}

// MsgUpdatePolicyPermissionsResponse defines the MsgUpdatePolicyPermissionsResponse message.
message MsgUpdatePolicyPermissionsResponse {}

// MsgDeletePolicyPermissions defines the MsgDeletePolicyPermissions message.
message MsgDeletePolicyPermissions {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string policy_address = 2;
}

// MsgDeletePolicyPermissionsResponse defines the MsgDeletePolicyPermissionsResponse message.
message MsgDeletePolicyPermissionsResponse {}

// MsgRegisterGroup defines the MsgRegisterGroup message.
message MsgRegisterGroup {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
  string description = 3;
  repeated string members = 4;
  repeated string member_weights = 5;
  uint64 funding_weight = 6;
  string max_spend_per_epoch = 7 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
  int64 update_cooldown = 8;
  string intended_parent_address = 9;
  uint64 min_members = 10;
  uint64 max_members = 11;
  int64 term_duration = 12;
  int64 activation_time = 13;
  int64 voting_period = 14;
  int64 min_execution_period = 15;
  bool futarchy_enabled = 16;
  string vote_threshold = 17 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"
  ];
  string policy_type = 18;
  repeated string allowed_messages = 19;
  string electoral_policy_address = 20;
}

// MsgRegisterGroupResponse defines the MsgRegisterGroupResponse message.
message MsgRegisterGroupResponse {}

// MsgRenewGroup defines the MsgRenewGroup message.
message MsgRenewGroup {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string group_name = 2;
  repeated string new_members = 3;
  repeated string new_member_weights = 4;
}

// MsgRenewGroupResponse defines the MsgRenewGroupResponse message.
message MsgRenewGroupResponse {}

// MsgUpdateGroupConfig defines the MsgUpdateGroupConfig message.
message MsgUpdateGroupConfig {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string group_name = 2;
  string max_spend_per_epoch = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
  int64 update_cooldown = 4;
  string vote_threshold = 5 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec"
  ];
  BoolValue futarchy_enabled = 6;
  uint64 min_members = 7;
  uint64 max_members = 8;
  int64 term_duration = 9;
  string policy_type = 10;
  int64 voting_period = 11;
  int64 min_execution_period = 12;
  string electoral_policy_address = 13;
}

// MsgUpdateGroupConfigResponse defines the MsgUpdateGroupConfigResponse message.
message MsgUpdateGroupConfigResponse {}

// MsgUpdateGroupMembers defines the MsgUpdateGroupMembers message.
message MsgUpdateGroupMembers {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string group_policy_address = 2;
  repeated string members_to_add = 3;
  repeated string weights_to_add = 4;
  repeated string members_to_remove = 5;
}

// MsgUpdateGroupMembersResponse defines the MsgUpdateGroupMembersResponse message.
message MsgUpdateGroupMembersResponse {}

// MsgForceUpgrade defines the MsgForceUpgrade message.
message MsgForceUpgrade {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  UpgradePlan plan = 2 [(gogoproto.nullable) = false];
}

// UpgradePlan is a local wrapper for cosmos.upgrade.v1beta1.Plan.
// This prevents import cycle/path conflicts in generated Go code.
message UpgradePlan {
  string name = 1;
  int64 height = 2;
  string info = 3;

  // We omit 'time' and 'upstream' as they are deprecated/rarely used for governance upgrades.
}

// MsgForceUpgradeResponse defines the MsgForceUpgradeResponse message.
message MsgForceUpgradeResponse {}

// BoolValue defines a wrapper around a bool field to support optionality.
message BoolValue {
  bool value = 1;
}

// MsgDeleteGroup defines the MsgDeleteGroup message.
message MsgDeleteGroup {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string group_name = 2;
}

// MsgDeleteGroupResponse defines the MsgDeleteGroupResponse message.
message MsgDeleteGroupResponse {}

// MsgVetoGroupProposals defines the MsgVetoGroupProposals message.
message MsgVetoGroupProposals {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string group_name = 2;
}

// MsgVetoGroupProposalsResponse defines the MsgVetoGroupProposalsResponse message.
message MsgVetoGroupProposalsResponse {}

// MsgSubmitProposal submits a new proposal to a council.
message MsgSubmitProposal {
  option (cosmos.msg.v1.signer) = "proposer";
  // proposer is the address submitting the proposal (must be a council member)
  string proposer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // policy_address is the council policy address to submit the proposal to
  string policy_address = 2;
  // messages are the messages to execute if the proposal passes
  repeated google.protobuf.Any messages = 3;
  // metadata is optional metadata about the proposal
  string metadata = 4;
}

// MsgSubmitProposalResponse defines the response for SubmitProposal.
message MsgSubmitProposalResponse {
  uint64 proposal_id = 1;
}

// MsgVoteProposal casts a vote on a proposal.
message MsgVoteProposal {
  option (cosmos.msg.v1.signer) = "voter";
  // voter is the address casting the vote (must be a council member)
  string voter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // proposal_id is the ID of the proposal to vote on
  uint64 proposal_id = 2;
  // option is the vote option
  VoteOption option = 3;
  // metadata is optional metadata about the vote
  string metadata = 4;
}

// MsgVoteProposalResponse defines the response for VoteProposal.
message MsgVoteProposalResponse {}

// MsgExecuteProposal executes an accepted proposal.
message MsgExecuteProposal {
  option (cosmos.msg.v1.signer) = "executor";
  // executor is the address executing the proposal (anyone can execute an accepted proposal)
  string executor = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // proposal_id is the ID of the proposal to execute
  uint64 proposal_id = 2;
}

// MsgExecuteProposalResponse defines the response for ExecuteProposal.
message MsgExecuteProposalResponse {}

// MsgSubmitAnonymousProposal creates a proposal through the x/shield module.
// The proposer field must be the shield module account address, verified by
// the shield's ZK proof and encrypted batch execution. This enables anonymous
// governance proposals where the identity of the proposer is hidden.
message MsgSubmitAnonymousProposal {
  option (cosmos.msg.v1.signer) = "proposer";
  option (amino.name) = "sparkdream/x/commons/MsgSubmitAnonymousProposal";
  // proposer must be the shield module account address
  string proposer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // policy_address is the council policy address to submit the proposal to
  string policy_address = 2;
  // messages are the messages to execute if the proposal passes
  repeated google.protobuf.Any messages = 3;
  // metadata is optional metadata about the proposal
  string metadata = 4;
}

// MsgSubmitAnonymousProposalResponse defines the response for SubmitAnonymousProposal.
message MsgSubmitAnonymousProposalResponse {
  uint64 proposal_id = 1;
}

// MsgAnonymousVoteProposal casts an anonymous vote on a proposal through x/shield.
// The voter field must be the shield module account address, verified by the shield's
// ZK proof. Each anonymous vote has uniform weight=1. Anonymous votes are tallied
// separately and combined with regular council votes for threshold checks.
message MsgAnonymousVoteProposal {
  option (cosmos.msg.v1.signer) = "voter";
  option (amino.name) = "sparkdream/x/commons/MsgAnonymousVoteProposal";
  // voter must be the shield module account address
  string voter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // proposal_id is the ID of the proposal to vote on
  uint64 proposal_id = 2;
  // option is the vote option
  VoteOption option = 3;
  // metadata is optional metadata about the vote
  string metadata = 4;
}

// MsgAnonymousVoteProposalResponse defines the response for AnonymousVoteProposal.
message MsgAnonymousVoteProposalResponse {}
