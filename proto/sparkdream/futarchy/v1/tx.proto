syntax = "proto3";

package sparkdream.futarchy.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sparkdream/futarchy/v1/params.proto";

option go_package = "sparkdream/x/futarchy/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // CreateMarket defines the CreateMarket RPC.
  rpc CreateMarket(MsgCreateMarket) returns (MsgCreateMarketResponse);

  // Trade defines the Trade RPC.
  rpc Trade(MsgTrade) returns (MsgTradeResponse);

  // Redeem defines the Redeem RPC.
  rpc Redeem(MsgRedeem) returns (MsgRedeemResponse);

  // CancelMarket defines the CancelMarket RPC (emergency governance operation).
  rpc CancelMarket(MsgCancelMarket) returns (MsgCancelMarketResponse);

  // WithdrawLiquidity defines the WithdrawLiquidity RPC.
  rpc WithdrawLiquidity(MsgWithdrawLiquidity) returns (MsgWithdrawLiquidityResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/futarchy/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgCreateMarket defines the MsgCreateMarket message.
message MsgCreateMarket {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string symbol = 2;
  string initial_liquidity = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
  string question = 4;
  int64 end_block = 5;
}

// MsgCreateMarketResponse defines the MsgCreateMarketResponse message.
message MsgCreateMarketResponse {
  uint64 market_id = 1;
}

// MsgTrade defines the MsgTrade message.
message MsgTrade {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 market_id = 2;
  bool is_yes = 3;
  string amount_in = 4 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
}

// MsgTradeResponse defines the MsgTradeResponse message.
message MsgTradeResponse {
  string shares_out = 1 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
}

// MsgRedeem defines the MsgRedeem message.
message MsgRedeem {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 market_id = 2;
}

// MsgRedeemResponse defines the MsgRedeemResponse message.
message MsgRedeemResponse {}

// MsgCancelMarket defines the MsgCancelMarket message.
message MsgCancelMarket {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/futarchy/MsgCancelMarket";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 market_id = 2;
  string reason = 3;
}

// MsgCancelMarketResponse defines the MsgCancelMarketResponse message.
message MsgCancelMarketResponse {}

// MsgWithdrawLiquidity defines the MsgWithdrawLiquidity message.
message MsgWithdrawLiquidity {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 market_id = 2;
}

// MsgWithdrawLiquidityResponse defines the MsgWithdrawLiquidityResponse message.
message MsgWithdrawLiquidityResponse {
  string amount = 1 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
}
