syntax = "proto3";
package sparkdream.futarchy.v1;

option go_package = "sparkdream/x/futarchy/types";

// Market defines the Market message.
message Market {
  // Metadata
  uint64 index = 1;
  string creator = 2;
  string symbol = 3;
  string question = 4;

  // Configuration
  string denom = 5;
  string min_tick = 6;

  // Temporal properties
  int64 end_block = 7;
  int64 redemption_blocks = 8;
  int64 resolution_height = 9;
  string status = 10;

  // LMSR state
  string b_value = 11;
  string pool_yes = 12;
  string pool_no = 13;

  // Liquidity tracking
  string initial_liquidity = 14;
  string liquidity_withdrawn = 15;
}
