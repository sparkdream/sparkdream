syntax = "proto3";

package sparkdream.futarchy.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "sparkdream/futarchy/v1/market.proto";
import "sparkdream/futarchy/v1/params.proto";

option go_package = "sparkdream/x/futarchy/types";

// GenesisState defines the futarchy module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Market market_map = 2 [(gogoproto.nullable) = false];
}
