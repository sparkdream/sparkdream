syntax = "proto3";
package sparkdream.vote.v1;

option go_package = "sparkdream/x/vote/types";

// VoterRegistration defines a voter's registration with ZK keys.
message VoterRegistration {
  string address = 1;
  bytes zk_public_key = 2;          // hash(secretKey), 32 bytes
  bytes encryption_public_key = 3;  // Babyjubjub point, for PRIVATE mode
  int64 registered_at = 4;
  bool active = 5;
}
