syntax = "proto3";

package sparkdream.vote.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "sparkdream/vote/v1/anonymous_vote.proto";
import "sparkdream/vote/v1/epoch_decryption_key.proto";
import "sparkdream/vote/v1/params.proto";
import "sparkdream/vote/v1/sealed_vote.proto";
import "sparkdream/vote/v1/srs_state.proto";
import "sparkdream/vote/v1/tle_decryption_share.proto";
import "sparkdream/vote/v1/tle_epoch_participation.proto";
import "sparkdream/vote/v1/tle_validator_liveness.proto";
import "sparkdream/vote/v1/tle_validator_share.proto";
import "sparkdream/vote/v1/used_nullifier.proto";
import "sparkdream/vote/v1/used_proposal_nullifier.proto";
import "sparkdream/vote/v1/voter_registration.proto";
import "sparkdream/vote/v1/voter_tree_snapshot.proto";
import "sparkdream/vote/v1/voting_proposal.proto";

option go_package = "sparkdream/x/vote/types";

// GenesisState defines the vote module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated VotingProposal voting_proposal_list = 2 [(gogoproto.nullable) = false];
  uint64 voting_proposal_count = 3;
  repeated VoterRegistration voter_registration_map = 4 [(gogoproto.nullable) = false];
  repeated AnonymousVote anonymous_vote_map = 5 [(gogoproto.nullable) = false];
  repeated SealedVote sealed_vote_map = 6 [(gogoproto.nullable) = false];
  repeated VoterTreeSnapshot voter_tree_snapshot_map = 7 [(gogoproto.nullable) = false];
  repeated UsedNullifier used_nullifier_map = 8 [(gogoproto.nullable) = false];
  repeated UsedProposalNullifier used_proposal_nullifier_map = 9 [(gogoproto.nullable) = false];
  repeated TleValidatorShare tle_validator_share_map = 10 [(gogoproto.nullable) = false];
  repeated TleDecryptionShare tle_decryption_share_map = 11 [(gogoproto.nullable) = false];
  repeated EpochDecryptionKey epoch_decryption_key_map = 12 [(gogoproto.nullable) = false];
  SrsState srs_state = 13;
  repeated TleEpochParticipation tle_epoch_participation_map = 14 [(gogoproto.nullable) = false];
  repeated TleValidatorLiveness tle_validator_liveness_map = 15 [(gogoproto.nullable) = false];
}
