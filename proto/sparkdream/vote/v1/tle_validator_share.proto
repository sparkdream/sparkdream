syntax = "proto3";
package sparkdream.vote.v1;

option go_package = "sparkdream/x/vote/types";

// TLEValidatorShare stores a validator's public key share from DKG ceremony.
message TleValidatorShare {
  string validator = 1;
  bytes public_key_share = 2; // BLS public key share (from DKG)
  uint64 share_index = 3; // Position in the sharing polynomial
  int64 registered_at = 4;
}
