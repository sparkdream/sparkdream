syntax = "proto3";

package sparkdream.vote.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/any.proto";
import "sparkdream/vote/v1/params.proto";
import "sparkdream/vote/v1/types.proto";

option go_package = "sparkdream/x/vote/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // RegisterVoter registers a voter for anonymous voting.
  rpc RegisterVoter(MsgRegisterVoter) returns (MsgRegisterVoterResponse);

  // DeactivateVoter deactivates a voter registration.
  rpc DeactivateVoter(MsgDeactivateVoter) returns (MsgDeactivateVoterResponse);

  // RotateVoterKey rotates a voter's ZK keys.
  rpc RotateVoterKey(MsgRotateVoterKey) returns (MsgRotateVoterKeyResponse);

  // CreateAnonymousProposal creates a proposal with ZK proof of eligibility.
  rpc CreateAnonymousProposal(MsgCreateAnonymousProposal) returns (MsgCreateAnonymousProposalResponse);

  // CreateProposal creates a proposal with public proposer identity.
  rpc CreateProposal(MsgCreateProposal) returns (MsgCreateProposalResponse);

  // CancelProposal cancels an active proposal.
  rpc CancelProposal(MsgCancelProposal) returns (MsgCancelProposalResponse);

  // Vote submits an anonymous vote with ZK proof (PUBLIC mode).
  rpc Vote(MsgVote) returns (MsgVoteResponse);

  // SealedVote submits a sealed vote (SEALED/PRIVATE mode).
  rpc SealedVote(MsgSealedVote) returns (MsgSealedVoteResponse);

  // RevealVote reveals a sealed vote after voting period ends.
  rpc RevealVote(MsgRevealVote) returns (MsgRevealVoteResponse);

  // SubmitDecryptionShare submits a TLE decryption key share.
  rpc SubmitDecryptionShare(MsgSubmitDecryptionShare) returns (MsgSubmitDecryptionShareResponse);

  // RegisterTLEShare registers a validator's TLE public key share.
  rpc RegisterTLEShare(MsgRegisterTLEShare) returns (MsgRegisterTLEShareResponse);

  // StoreSRS stores the PLONK universal SRS on-chain.
  rpc StoreSRS(MsgStoreSRS) returns (MsgStoreSRSResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/vote/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgRegisterVoter registers for anonymous voting.
message MsgRegisterVoter {
  option (cosmos.msg.v1.signer) = "voter";
  string voter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes zk_public_key = 2; // hash(secretKey), 32 bytes
  bytes encryption_public_key = 3; // Babyjubjub point, required
}

message MsgRegisterVoterResponse {}

// MsgDeactivateVoter deactivates registration (voluntary).
message MsgDeactivateVoter {
  option (cosmos.msg.v1.signer) = "voter";
  string voter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgDeactivateVoterResponse {}

// MsgRotateVoterKey rotates ZK secret key (atomic re-registration).
message MsgRotateVoterKey {
  option (cosmos.msg.v1.signer) = "voter";
  string voter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes new_zk_public_key = 2;
  bytes new_encryption_public_key = 3; // If empty: keep existing key
}

message MsgRotateVoterKeyResponse {}

// MsgCreateAnonymousProposal creates a proposal anonymously with ZK proof.
message MsgCreateAnonymousProposal {
  option (cosmos.msg.v1.signer) = "submitter";
  string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // Content (plaintext for PUBLIC/SEALED)
  string title = 2;
  string description = 3;

  // Content (encrypted for PRIVATE)
  bytes encrypted_content = 4;
  bytes content_nonce = 5;
  repeated EncryptedKeyShare key_shares = 6;

  // Proposal config
  ProposalType proposal_type = 7;
  uint64 reference_id = 8;
  repeated VoteOption options = 9;
  int64 voting_period_epochs = 10;
  string quorum = 11 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  string threshold = 12 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  VisibilityLevel visibility = 13;

  // ZK proof of eligibility
  bytes nullifier = 14;
  uint64 nonce = 15;
  uint64 claimed_epoch = 16;
  bytes proof = 17;

  // Executable messages (x/gov pattern)
  repeated google.protobuf.Any messages = 18;

  // Veto threshold
  string veto_threshold = 19 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

message MsgCreateAnonymousProposalResponse {
  uint64 proposal_id = 1;
}

// MsgCreateProposal creates a proposal with public proposer identity.
message MsgCreateProposal {
  option (cosmos.msg.v1.signer) = "proposer";
  string proposer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string title = 2;
  string description = 3;
  ProposalType proposal_type = 4;
  uint64 reference_id = 5;
  repeated VoteOption options = 6;
  int64 voting_period_epochs = 7;
  string quorum = 8 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  string threshold = 9 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
  VisibilityLevel visibility = 10;
  repeated cosmos.base.v1beta1.Coin deposit = 11 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];
  repeated google.protobuf.Any messages = 12;
  string veto_threshold = 13 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];
}

message MsgCreateProposalResponse {
  uint64 proposal_id = 1;
}

// MsgCancelProposal cancels an active proposal.
message MsgCancelProposal {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 proposal_id = 2;
  string reason = 3;
}

message MsgCancelProposalResponse {}

// MsgVote submits an anonymous vote with ZK proof (PUBLIC mode).
message MsgVote {
  option (cosmos.msg.v1.signer) = "submitter";
  string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 proposal_id = 2;
  bytes nullifier = 3;
  uint32 vote_option = 4;
  bytes proof = 5;
}

message MsgVoteResponse {}

// MsgSealedVote submits a sealed vote (SEALED/PRIVATE mode).
message MsgSealedVote {
  option (cosmos.msg.v1.signer) = "submitter";
  string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 proposal_id = 2;
  bytes nullifier = 3;
  bytes vote_commitment = 4;
  bytes proof = 5;
  bytes encrypted_reveal = 6;
}

message MsgSealedVoteResponse {}

// MsgRevealVote reveals a sealed vote after voting period ends.
message MsgRevealVote {
  option (cosmos.msg.v1.signer) = "submitter";
  string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 proposal_id = 2;
  bytes nullifier = 3;
  uint32 vote_option = 4;
  bytes reveal_salt = 5;
}

message MsgRevealVoteResponse {}

// MsgSubmitDecryptionShare submits a decryption key share for an epoch.
message MsgSubmitDecryptionShare {
  option (cosmos.msg.v1.signer) = "validator";
  string validator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 epoch = 2;
  bytes decryption_share = 3;
  bytes correctness_proof = 4;
}

message MsgSubmitDecryptionShareResponse {}

// MsgRegisterTLEShare registers a validator's public key share from DKG.
message MsgRegisterTLEShare {
  option (cosmos.msg.v1.signer) = "validator";
  string validator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes public_key_share = 2;
  uint64 share_index = 3;
}

message MsgRegisterTLEShareResponse {}

// MsgStoreSRS stores the PLONK universal SRS on-chain.
message MsgStoreSRS {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  bytes srs = 2;
}

message MsgStoreSRSResponse {}
