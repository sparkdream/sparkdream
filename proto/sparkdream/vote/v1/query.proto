syntax = "proto3";

package sparkdream.vote.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "sparkdream/vote/v1/anonymous_vote.proto";
import "sparkdream/vote/v1/epoch_decryption_key.proto";
import "sparkdream/vote/v1/params.proto";
import "sparkdream/vote/v1/sealed_vote.proto";
import "sparkdream/vote/v1/srs_state.proto";
import "sparkdream/vote/v1/tle_decryption_share.proto";
import "sparkdream/vote/v1/tle_epoch_participation.proto";
import "sparkdream/vote/v1/tle_validator_share.proto";
import "sparkdream/vote/v1/types.proto";
import "sparkdream/vote/v1/used_nullifier.proto";
import "sparkdream/vote/v1/used_proposal_nullifier.proto";
import "sparkdream/vote/v1/voter_registration.proto";
import "sparkdream/vote/v1/voter_tree_snapshot.proto";
import "sparkdream/vote/v1/voting_proposal.proto";

option go_package = "sparkdream/x/vote/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/params";
  }

  // GetVotingProposal queries a VotingProposal by ID.
  rpc GetVotingProposal(QueryGetVotingProposalRequest) returns (QueryGetVotingProposalResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voting_proposal/{id}";
  }

  // ListVotingProposal queries all VotingProposal items.
  rpc ListVotingProposal(QueryAllVotingProposalRequest) returns (QueryAllVotingProposalResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voting_proposal";
  }

  // GetVoterRegistration queries a VoterRegistration by address.
  rpc GetVoterRegistration(QueryGetVoterRegistrationRequest) returns (QueryGetVoterRegistrationResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voter_registration/{address}";
  }

  // ListVoterRegistration queries all VoterRegistration items.
  rpc ListVoterRegistration(QueryAllVoterRegistrationRequest) returns (QueryAllVoterRegistrationResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voter_registration";
  }

  // GetAnonymousVote queries an AnonymousVote by index.
  rpc GetAnonymousVote(QueryGetAnonymousVoteRequest) returns (QueryGetAnonymousVoteResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/anonymous_vote/{index}";
  }

  // ListAnonymousVote queries all AnonymousVote items.
  rpc ListAnonymousVote(QueryAllAnonymousVoteRequest) returns (QueryAllAnonymousVoteResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/anonymous_vote";
  }

  // GetSealedVote queries a SealedVote by index.
  rpc GetSealedVote(QueryGetSealedVoteRequest) returns (QueryGetSealedVoteResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/sealed_vote/{index}";
  }

  // ListSealedVote queries all SealedVote items.
  rpc ListSealedVote(QueryAllSealedVoteRequest) returns (QueryAllSealedVoteResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/sealed_vote";
  }

  // GetVoterTreeSnapshot queries a VoterTreeSnapshot by proposal ID.
  rpc GetVoterTreeSnapshot(QueryGetVoterTreeSnapshotRequest) returns (QueryGetVoterTreeSnapshotResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voter_tree_snapshot/{proposal_id}";
  }

  // ListVoterTreeSnapshot queries all VoterTreeSnapshot items.
  rpc ListVoterTreeSnapshot(QueryAllVoterTreeSnapshotRequest) returns (QueryAllVoterTreeSnapshotResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voter_tree_snapshot";
  }

  // GetUsedNullifier queries a UsedNullifier by index.
  rpc GetUsedNullifier(QueryGetUsedNullifierRequest) returns (QueryGetUsedNullifierResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/used_nullifier/{index}";
  }

  // ListUsedNullifier queries all UsedNullifier items.
  rpc ListUsedNullifier(QueryAllUsedNullifierRequest) returns (QueryAllUsedNullifierResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/used_nullifier";
  }

  // GetUsedProposalNullifier queries a UsedProposalNullifier by index.
  rpc GetUsedProposalNullifier(QueryGetUsedProposalNullifierRequest) returns (QueryGetUsedProposalNullifierResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/used_proposal_nullifier/{index}";
  }

  // ListUsedProposalNullifier queries all UsedProposalNullifier items.
  rpc ListUsedProposalNullifier(QueryAllUsedProposalNullifierRequest) returns (QueryAllUsedProposalNullifierResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/used_proposal_nullifier";
  }

  // GetTleValidatorShare queries a TleValidatorShare by validator.
  rpc GetTleValidatorShare(QueryGetTleValidatorShareRequest) returns (QueryGetTleValidatorShareResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_validator_share/{validator}";
  }

  // ListTleValidatorShare queries all TleValidatorShare items.
  rpc ListTleValidatorShare(QueryAllTleValidatorShareRequest) returns (QueryAllTleValidatorShareResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_validator_share";
  }

  // GetTleDecryptionShare queries a TleDecryptionShare by index.
  rpc GetTleDecryptionShare(QueryGetTleDecryptionShareRequest) returns (QueryGetTleDecryptionShareResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_decryption_share/{index}";
  }

  // ListTleDecryptionShare queries all TleDecryptionShare items.
  rpc ListTleDecryptionShare(QueryAllTleDecryptionShareRequest) returns (QueryAllTleDecryptionShareResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_decryption_share";
  }

  // GetEpochDecryptionKey queries an EpochDecryptionKey by epoch.
  rpc GetEpochDecryptionKey(QueryGetEpochDecryptionKeyRequest) returns (QueryGetEpochDecryptionKeyResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/epoch_decryption_key/{epoch}";
  }

  // ListEpochDecryptionKey queries all EpochDecryptionKey items.
  rpc ListEpochDecryptionKey(QueryAllEpochDecryptionKeyRequest) returns (QueryAllEpochDecryptionKeyResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/epoch_decryption_key";
  }

  // GetSrsState queries the SRS state.
  rpc GetSrsState(QueryGetSrsStateRequest) returns (QueryGetSrsStateResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/srs_state";
  }

  // Proposal queries a specific proposal by ID.
  rpc Proposal(QueryProposalRequest) returns (QueryProposalResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/proposal/{proposal_id}";
  }

  // Proposals queries all proposals.
  rpc Proposals(QueryProposalsRequest) returns (QueryProposalsResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/proposals";
  }

  // ProposalsByStatus queries proposals filtered by status.
  rpc ProposalsByStatus(QueryProposalsByStatusRequest) returns (QueryProposalsByStatusResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/proposals_by_status/{status}";
  }

  // ProposalsByType queries proposals filtered by type.
  rpc ProposalsByType(QueryProposalsByTypeRequest) returns (QueryProposalsByTypeResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/proposals_by_type/{proposal_type}";
  }

  // ProposalTally queries the current tally of a proposal.
  rpc ProposalTally(QueryProposalTallyRequest) returns (QueryProposalTallyResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/proposal_tally/{proposal_id}";
  }

  // ProposalVotes queries the votes for a proposal.
  rpc ProposalVotes(QueryProposalVotesRequest) returns (QueryProposalVotesResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/proposal_votes/{proposal_id}";
  }

  // VoterRegistrationQuery queries a voter registration by address.
  rpc VoterRegistrationQuery(QueryVoterRegistrationQueryRequest) returns (QueryVoterRegistrationQueryResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voter_registration_query/{address}";
  }

  // VoterRegistrations queries all voter registrations.
  rpc VoterRegistrations(QueryVoterRegistrationsRequest) returns (QueryVoterRegistrationsResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voter_registrations";
  }

  // VoterTreeSnapshotQuery queries a voter tree snapshot by proposal ID.
  rpc VoterTreeSnapshotQuery(QueryVoterTreeSnapshotQueryRequest) returns (QueryVoterTreeSnapshotQueryResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voter_tree_snapshot_query/{proposal_id}";
  }

  // VoterMerkleProof queries a Merkle proof for a voter.
  rpc VoterMerkleProof(QueryVoterMerkleProofRequest) returns (QueryVoterMerkleProofResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/voter_merkle_proof/{proposal_id}/{public_key}";
  }

  // NullifierUsed checks if a vote nullifier has been used.
  rpc NullifierUsed(QueryNullifierUsedRequest) returns (QueryNullifierUsedResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/nullifier_used/{proposal_id}/{nullifier}";
  }

  // ProposalNullifierUsed checks if a proposal creation nullifier has been used.
  rpc ProposalNullifierUsed(QueryProposalNullifierUsedRequest) returns (QueryProposalNullifierUsedResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/proposal_nullifier_used/{epoch}/{nullifier}";
  }

  // TleStatus queries the TLE system status.
  rpc TleStatus(QueryTleStatusRequest) returns (QueryTleStatusResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_status";
  }

  // EpochDecryptionKeyQuery queries the decryption key for an epoch.
  rpc EpochDecryptionKeyQuery(QueryEpochDecryptionKeyQueryRequest) returns (QueryEpochDecryptionKeyQueryResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/epoch_decryption_key_query/{epoch}";
  }

  // TleValidatorShares queries all TLE validator shares.
  rpc TleValidatorShares(QueryTleValidatorSharesRequest) returns (QueryTleValidatorSharesResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_validator_shares";
  }

  // TleLiveness returns liveness summary for all TLE validators across the miss window.
  rpc TleLiveness(QueryTleLivenessRequest) returns (QueryTleLivenessResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_liveness";
  }

  // TleValidatorLiveness returns liveness data for a single TLE validator.
  rpc TleValidatorLiveness(QueryTleValidatorLivenessRequest) returns (QueryTleValidatorLivenessResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_validator_liveness/{validator}";
  }

  // GetTleEpochParticipation returns the raw participation record for a specific epoch.
  rpc GetTleEpochParticipation(QueryGetTleEpochParticipationRequest) returns (QueryGetTleEpochParticipationResponse) {
    option (google.api.http).get = "/sparkdream/vote/v1/tle_epoch_participation/{epoch}";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message QueryGetVotingProposalRequest {
  uint64 id = 1;
}

message QueryGetVotingProposalResponse {
  VotingProposal voting_proposal = 1 [(gogoproto.nullable) = false];
}

message QueryAllVotingProposalRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllVotingProposalResponse {
  repeated VotingProposal voting_proposal = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetVoterRegistrationRequest {
  string address = 1;
}

message QueryGetVoterRegistrationResponse {
  VoterRegistration voter_registration = 1 [(gogoproto.nullable) = false];
}

message QueryAllVoterRegistrationRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllVoterRegistrationResponse {
  repeated VoterRegistration voter_registration = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetAnonymousVoteRequest {
  string index = 1;
}

message QueryGetAnonymousVoteResponse {
  AnonymousVote anonymous_vote = 1 [(gogoproto.nullable) = false];
}

message QueryAllAnonymousVoteRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllAnonymousVoteResponse {
  repeated AnonymousVote anonymous_vote = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetSealedVoteRequest {
  string index = 1;
}

message QueryGetSealedVoteResponse {
  SealedVote sealed_vote = 1 [(gogoproto.nullable) = false];
}

message QueryAllSealedVoteRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllSealedVoteResponse {
  repeated SealedVote sealed_vote = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetVoterTreeSnapshotRequest {
  uint64 proposal_id = 1;
}

message QueryGetVoterTreeSnapshotResponse {
  VoterTreeSnapshot voter_tree_snapshot = 1 [(gogoproto.nullable) = false];
}

message QueryAllVoterTreeSnapshotRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllVoterTreeSnapshotResponse {
  repeated VoterTreeSnapshot voter_tree_snapshot = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetUsedNullifierRequest {
  string index = 1;
}

message QueryGetUsedNullifierResponse {
  UsedNullifier used_nullifier = 1 [(gogoproto.nullable) = false];
}

message QueryAllUsedNullifierRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllUsedNullifierResponse {
  repeated UsedNullifier used_nullifier = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetUsedProposalNullifierRequest {
  string index = 1;
}

message QueryGetUsedProposalNullifierResponse {
  UsedProposalNullifier used_proposal_nullifier = 1 [(gogoproto.nullable) = false];
}

message QueryAllUsedProposalNullifierRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllUsedProposalNullifierResponse {
  repeated UsedProposalNullifier used_proposal_nullifier = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetTleValidatorShareRequest {
  string validator = 1;
}

message QueryGetTleValidatorShareResponse {
  TleValidatorShare tle_validator_share = 1 [(gogoproto.nullable) = false];
}

message QueryAllTleValidatorShareRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllTleValidatorShareResponse {
  repeated TleValidatorShare tle_validator_share = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetTleDecryptionShareRequest {
  string index = 1;
}

message QueryGetTleDecryptionShareResponse {
  TleDecryptionShare tle_decryption_share = 1 [(gogoproto.nullable) = false];
}

message QueryAllTleDecryptionShareRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllTleDecryptionShareResponse {
  repeated TleDecryptionShare tle_decryption_share = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetEpochDecryptionKeyRequest {
  uint64 epoch = 1;
}

message QueryGetEpochDecryptionKeyResponse {
  EpochDecryptionKey epoch_decryption_key = 1 [(gogoproto.nullable) = false];
}

message QueryAllEpochDecryptionKeyRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllEpochDecryptionKeyResponse {
  repeated EpochDecryptionKey epoch_decryption_key = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetSrsStateRequest {}

message QueryGetSrsStateResponse {
  SrsState srs_state = 1 [(gogoproto.nullable) = false];
}

// Custom query messages

message QueryProposalRequest {
  uint64 proposal_id = 1;
}

message QueryProposalResponse {
  VotingProposal proposal = 1 [(gogoproto.nullable) = false];
}

message QueryProposalsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryProposalsResponse {
  repeated VotingProposal proposals = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryProposalsByStatusRequest {
  uint64 status = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryProposalsByStatusResponse {
  repeated VotingProposal proposals = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryProposalsByTypeRequest {
  uint64 proposal_type = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryProposalsByTypeResponse {
  repeated VotingProposal proposals = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryProposalTallyRequest {
  uint64 proposal_id = 1;
}

message QueryProposalTallyResponse {
  repeated VoteTally tally = 1;
  uint64 total_votes = 2;
  uint64 eligible_voters = 3;
}

message QueryProposalVotesRequest {
  uint64 proposal_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryProposalVotesResponse {
  repeated AnonymousVote votes = 1 [(gogoproto.nullable) = false];
  repeated SealedVote sealed_votes = 2 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 3;
}

message QueryVoterRegistrationQueryRequest {
  string address = 1;
}

message QueryVoterRegistrationQueryResponse {
  VoterRegistration registration = 1 [(gogoproto.nullable) = false];
}

message QueryVoterRegistrationsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryVoterRegistrationsResponse {
  repeated VoterRegistration registrations = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryVoterTreeSnapshotQueryRequest {
  uint64 proposal_id = 1;
}

message QueryVoterTreeSnapshotQueryResponse {
  VoterTreeSnapshot snapshot = 1 [(gogoproto.nullable) = false];
}

message QueryVoterMerkleProofRequest {
  uint64 proposal_id = 1;
  string public_key = 2;
}

message QueryVoterMerkleProofResponse {
  bytes merkle_root = 1;
  bytes leaf = 2;
  int32 leaf_index = 3;
  repeated bytes path_elements = 4;
  repeated uint64 path_indices = 5;
}

message QueryNullifierUsedRequest {
  uint64 proposal_id = 1;
  string nullifier = 2;
}

message QueryNullifierUsedResponse {
  bool used = 1;
  int64 used_at = 2;
}

message QueryProposalNullifierUsedRequest {
  uint64 epoch = 1;
  string nullifier = 2;
}

message QueryProposalNullifierUsedResponse {
  bool used = 1;
  int64 used_at = 2;
}

message QueryTleStatusRequest {}

message QueryTleStatusResponse {
  bool tle_enabled = 1;
  uint64 current_epoch = 2;
  uint64 latest_available_epoch = 3;
  bytes master_public_key = 4;
}

message QueryEpochDecryptionKeyQueryRequest {
  uint64 epoch = 1;
}

message QueryEpochDecryptionKeyQueryResponse {
  uint64 epoch = 1;
  bool available = 2;
  bytes decryption_key = 3;
  uint64 shares_received = 4;
  uint64 shares_needed = 5;
}

message QueryTleValidatorSharesRequest {}

message QueryTleValidatorSharesResponse {
  repeated TleValidatorShare shares = 1 [(gogoproto.nullable) = false];
  uint64 total_validators = 2;
  uint64 registered_validators = 3;
  uint64 threshold_needed = 4;
}

// --- TLE Liveness Queries ---

message TleValidatorLivenessInfo {
  string validator = 1;
  uint32 missed_epochs = 2;
  uint32 participated_epochs = 3;
  uint32 window_size = 4;
  bool over_tolerance = 5;
  int64 flagged_at = 6;      // block height when flagged inactive (0 if active)
  int64 recovered_at = 7;    // block height when last recovered (0 if never flagged)
}

message QueryTleLivenessRequest {}

message QueryTleLivenessResponse {
  repeated TleValidatorLivenessInfo validators = 1 [(gogoproto.nullable) = false];
  uint32 window_size = 2;
  uint32 miss_tolerance = 3;
}

message QueryTleValidatorLivenessRequest {
  string validator = 1;
}

message QueryTleValidatorLivenessResponse {
  TleValidatorLivenessInfo liveness = 1 [(gogoproto.nullable) = false];
}

message QueryGetTleEpochParticipationRequest {
  uint64 epoch = 1;
}

message QueryGetTleEpochParticipationResponse {
  TleEpochParticipation participation = 1 [(gogoproto.nullable) = false];
}
