message MsgResolveUnappealedModerationResponse {}

// ============================================================================
// Retroactive Public Goods Funding Messages
// ============================================================================

// MsgNominate creates a retroactive public goods funding nomination.
message MsgNominate {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string content_ref = 2; // e.g. "blog/post/42"
  string rationale = 3;
}

// MsgNominateResponse defines the response for MsgNominate.
message MsgNominateResponse {
  uint64 nomination_id = 1;
}

// MsgStakeNomination stakes DREAM on a nomination.
message MsgStakeNomination {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 nomination_id = 2;
  string amount = 3; // DREAM amount as decimal string
}

// MsgStakeNominationResponse defines the response for MsgStakeNomination.
message MsgStakeNominationResponse {}

// MsgUnstakeNomination removes a DREAM stake from a nomination.
message MsgUnstakeNomination {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 nomination_id = 2;
}

// MsgUnstakeNominationResponse defines the response for MsgUnstakeNomination.
message MsgUnstakeNominationResponse {}
