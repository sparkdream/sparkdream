// MsgCreateQuest defines the MsgCreateQuest message (governance-gated).
message MsgCreateQuest {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/season/MsgCreateQuest";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string quest_id = 2;
  string name = 3;
  string description = 4;
  uint64 xp_reward = 5;
  bool repeatable = 6;
  uint64 cooldown_epochs = 7;
  uint64 season = 8;
  int64 start_block = 9;
  int64 end_block = 10;
  uint64 min_level = 11;
  string required_achievement = 12;
  string prerequisite_quest = 13;
  string quest_chain = 14;
}

// MsgCreateQuestResponse defines the MsgCreateQuestResponse message.
message MsgCreateQuestResponse {}

