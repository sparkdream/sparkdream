syntax = "proto3";

package sparkdream.season.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sparkdream/season/v1/params.proto";

option go_package = "sparkdream/x/season/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // SetDisplayName defines the SetDisplayName RPC.
  rpc SetDisplayName(MsgSetDisplayName) returns (MsgSetDisplayNameResponse);

  // SetUsername defines the SetUsername RPC.
  rpc SetUsername(MsgSetUsername) returns (MsgSetUsernameResponse);

  // SetDisplayTitle defines the SetDisplayTitle RPC.
  rpc SetDisplayTitle(MsgSetDisplayTitle) returns (MsgSetDisplayTitleResponse);

  // CreateGuild defines the CreateGuild RPC.
  rpc CreateGuild(MsgCreateGuild) returns (MsgCreateGuildResponse);

  // JoinGuild defines the JoinGuild RPC.
  rpc JoinGuild(MsgJoinGuild) returns (MsgJoinGuildResponse);

  // LeaveGuild defines the LeaveGuild RPC.
  rpc LeaveGuild(MsgLeaveGuild) returns (MsgLeaveGuildResponse);

  // TransferGuildFounder defines the TransferGuildFounder RPC.
  rpc TransferGuildFounder(MsgTransferGuildFounder) returns (MsgTransferGuildFounderResponse);

  // DissolveGuild defines the DissolveGuild RPC.
  rpc DissolveGuild(MsgDissolveGuild) returns (MsgDissolveGuildResponse);

  // PromoteToOfficer defines the PromoteToOfficer RPC.
  rpc PromoteToOfficer(MsgPromoteToOfficer) returns (MsgPromoteToOfficerResponse);

  // DemoteOfficer defines the DemoteOfficer RPC.
  rpc DemoteOfficer(MsgDemoteOfficer) returns (MsgDemoteOfficerResponse);

  // InviteToGuild defines the InviteToGuild RPC.
  rpc InviteToGuild(MsgInviteToGuild) returns (MsgInviteToGuildResponse);

  // AcceptGuildInvite defines the AcceptGuildInvite RPC.
  rpc AcceptGuildInvite(MsgAcceptGuildInvite) returns (MsgAcceptGuildInviteResponse);

  // RevokeGuildInvite defines the RevokeGuildInvite RPC.
  rpc RevokeGuildInvite(MsgRevokeGuildInvite) returns (MsgRevokeGuildInviteResponse);

  // SetGuildInviteOnly defines the SetGuildInviteOnly RPC.
  rpc SetGuildInviteOnly(MsgSetGuildInviteOnly) returns (MsgSetGuildInviteOnlyResponse);

  // UpdateGuildDescription defines the UpdateGuildDescription RPC.
  rpc UpdateGuildDescription(MsgUpdateGuildDescription) returns (MsgUpdateGuildDescriptionResponse);

  // KickFromGuild defines the KickFromGuild RPC.
  rpc KickFromGuild(MsgKickFromGuild) returns (MsgKickFromGuildResponse);

  // ClaimGuildFounder defines the ClaimGuildFounder RPC.
  rpc ClaimGuildFounder(MsgClaimGuildFounder) returns (MsgClaimGuildFounderResponse);

  // StartQuest defines the StartQuest RPC.
  rpc StartQuest(MsgStartQuest) returns (MsgStartQuestResponse);

  // ClaimQuestReward defines the ClaimQuestReward RPC.
  rpc ClaimQuestReward(MsgClaimQuestReward) returns (MsgClaimQuestRewardResponse);

  // AbandonQuest defines the AbandonQuest RPC.
  rpc AbandonQuest(MsgAbandonQuest) returns (MsgAbandonQuestResponse);

  // CreateQuest defines the CreateQuest RPC.
  rpc CreateQuest(MsgCreateQuest) returns (MsgCreateQuestResponse);

  // DeactivateQuest defines the DeactivateQuest RPC.
  rpc DeactivateQuest(MsgDeactivateQuest) returns (MsgDeactivateQuestResponse);

  // ExtendSeason defines the ExtendSeason RPC.
  rpc ExtendSeason(MsgExtendSeason) returns (MsgExtendSeasonResponse);

  // SetNextSeasonInfo defines the SetNextSeasonInfo RPC.
  rpc SetNextSeasonInfo(MsgSetNextSeasonInfo) returns (MsgSetNextSeasonInfoResponse);

  // AbortSeasonTransition defines the AbortSeasonTransition RPC.
  rpc AbortSeasonTransition(MsgAbortSeasonTransition) returns (MsgAbortSeasonTransitionResponse);

  // RetrySeasonTransition defines the RetrySeasonTransition RPC.
  rpc RetrySeasonTransition(MsgRetrySeasonTransition) returns (MsgRetrySeasonTransitionResponse);

  // SkipTransitionPhase defines the SkipTransitionPhase RPC.
  rpc SkipTransitionPhase(MsgSkipTransitionPhase) returns (MsgSkipTransitionPhaseResponse);

  // ReportDisplayName defines the ReportDisplayName RPC.
  rpc ReportDisplayName(MsgReportDisplayName) returns (MsgReportDisplayNameResponse);

  // AppealDisplayNameModeration defines the AppealDisplayNameModeration RPC.
  rpc AppealDisplayNameModeration(MsgAppealDisplayNameModeration) returns (MsgAppealDisplayNameModerationResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/season/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

