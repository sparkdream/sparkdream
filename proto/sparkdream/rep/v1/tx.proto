message MsgAcceptInvitationResponse {}

// MsgTransferDream defines the MsgTransferDream message.
message MsgTransferDream {
  option (cosmos.msg.v1.signer) = "sender";
  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string recipient = 2;
  string amount = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
  TransferPurpose purpose = 4;
  string reference = 5;
}

enum TransferPurpose {
  TRANSFER_PURPOSE_TIP = 0;
  TRANSFER_PURPOSE_GIFT = 1;
  TRANSFER_PURPOSE_BOUNTY = 2;
}

// MsgTransferDreamResponse defines the MsgTransferDreamResponse message.
message MsgTransferDreamResponse {}

