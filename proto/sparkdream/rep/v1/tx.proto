syntax = "proto3";

package sparkdream.rep.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sparkdream/rep/v1/interim.proto";
import "sparkdream/rep/v1/jury_review.proto";
import "sparkdream/rep/v1/params.proto";
import "sparkdream/rep/v1/project.proto";
import "sparkdream/rep/v1/stake.proto";

option go_package = "sparkdream/x/rep/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // UpdateOperationalParams defines an operation for updating operational
  // parameters. Can be called by committee/council authority.
  rpc UpdateOperationalParams(MsgUpdateOperationalParams) returns (MsgUpdateOperationalParamsResponse);

  // InviteMember defines the InviteMember RPC.
  rpc InviteMember(MsgInviteMember) returns (MsgInviteMemberResponse);

  // AcceptInvitation defines the AcceptInvitation RPC.
  rpc AcceptInvitation(MsgAcceptInvitation) returns (MsgAcceptInvitationResponse);

  // TransferDream defines the TransferDream RPC.
  rpc TransferDream(MsgTransferDream) returns (MsgTransferDreamResponse);

  // CreateInterim defines the CreateInterim RPC.
  rpc CreateInterim(MsgCreateInterim) returns (MsgCreateInterimResponse);

  // AssignInterim defines the AssignInterim RPC.
  rpc AssignInterim(MsgAssignInterim) returns (MsgAssignInterimResponse);

  // SubmitInterimWork defines the SubmitInterimWork RPC.
  rpc SubmitInterimWork(MsgSubmitInterimWork) returns (MsgSubmitInterimWorkResponse);

  // ApproveInterim defines the ApproveInterim RPC.
  rpc ApproveInterim(MsgApproveInterim) returns (MsgApproveInterimResponse);

  // AbandonInterim defines the AbandonInterim RPC.
  rpc AbandonInterim(MsgAbandonInterim) returns (MsgAbandonInterimResponse);

  // CompleteInterim defines the CompleteInterim RPC.
  rpc CompleteInterim(MsgCompleteInterim) returns (MsgCompleteInterimResponse);

  // ProposeProject defines the ProposeProject RPC.
  rpc ProposeProject(MsgProposeProject) returns (MsgProposeProjectResponse);

  // ApproveProjectBudget defines the ApproveProjectBudget RPC.
  rpc ApproveProjectBudget(MsgApproveProjectBudget) returns (MsgApproveProjectBudgetResponse);

  // CancelProject defines the CancelProject RPC.
  rpc CancelProject(MsgCancelProject) returns (MsgCancelProjectResponse);

  // CreateInitiative defines the CreateInitiative RPC.
  rpc CreateInitiative(MsgCreateInitiative) returns (MsgCreateInitiativeResponse);

  // AssignInitiative defines the AssignInitiative RPC.
  rpc AssignInitiative(MsgAssignInitiative) returns (MsgAssignInitiativeResponse);

  // SubmitInitiativeWork defines the SubmitInitiativeWork RPC.
  rpc SubmitInitiativeWork(MsgSubmitInitiativeWork) returns (MsgSubmitInitiativeWorkResponse);

  // ApproveInitiative defines the ApproveInitiative RPC.
  rpc ApproveInitiative(MsgApproveInitiative) returns (MsgApproveInitiativeResponse);

  // AbandonInitiative defines the AbandonInitiative RPC.
  rpc AbandonInitiative(MsgAbandonInitiative) returns (MsgAbandonInitiativeResponse);

  // CompleteInitiative defines the CompleteInitiative RPC.
  rpc CompleteInitiative(MsgCompleteInitiative) returns (MsgCompleteInitiativeResponse);

  // Stake defines the Stake RPC.
  rpc Stake(MsgStake) returns (MsgStakeResponse);

  // Unstake defines the Unstake RPC.
  rpc Unstake(MsgUnstake) returns (MsgUnstakeResponse);

  // ClaimStakingRewards defines the ClaimStakingRewards RPC.
  rpc ClaimStakingRewards(MsgClaimStakingRewards) returns (MsgClaimStakingRewardsResponse);

  // CompoundStakingRewards defines the CompoundStakingRewards RPC.
  rpc CompoundStakingRewards(MsgCompoundStakingRewards) returns (MsgCompoundStakingRewardsResponse);

  // CreateChallenge defines the CreateChallenge RPC.
  rpc CreateChallenge(MsgCreateChallenge) returns (MsgCreateChallengeResponse);

  // RespondToChallenge defines the RespondToChallenge RPC.
  rpc RespondToChallenge(MsgRespondToChallenge) returns (MsgRespondToChallengeResponse);

  // SubmitJurorVote defines the SubmitJurorVote RPC.
  rpc SubmitJurorVote(MsgSubmitJurorVote) returns (MsgSubmitJurorVoteResponse);

  // SubmitExpertTestimony defines the SubmitExpertTestimony RPC.
  rpc SubmitExpertTestimony(MsgSubmitExpertTestimony) returns (MsgSubmitExpertTestimonyResponse);

  // ChallengeContent creates a challenge against bonded content.
  rpc ChallengeContent(MsgChallengeContent) returns (MsgChallengeContentResponse);

  // RespondToContentChallenge allows the content author to respond to a challenge.
  rpc RespondToContentChallenge(MsgRespondToContentChallenge) returns (MsgRespondToContentChallengeResponse);

  // RegisterZkPublicKey defines the RegisterZkPublicKey RPC.
  rpc RegisterZkPublicKey(MsgRegisterZkPublicKey) returns (MsgRegisterZkPublicKeyResponse);

  // CreateTag defines the CreateTag RPC. Permissionless tag registry creation
  // for members meeting the minimum trust level. Deducts the tag-creation fee
  // from the creator (split between burn and community pool).
  rpc CreateTag(MsgCreateTag) returns (MsgCreateTagResponse);

  // ReportTag defines the ReportTag RPC.
  rpc ReportTag(MsgReportTag) returns (MsgReportTagResponse);

  // ResolveTagReport defines the ResolveTagReport RPC.
  rpc ResolveTagReport(MsgResolveTagReport) returns (MsgResolveTagReportResponse);

  // CreateTagBudget defines the CreateTagBudget RPC.
  rpc CreateTagBudget(MsgCreateTagBudget) returns (MsgCreateTagBudgetResponse);

  // AwardFromTagBudget defines the AwardFromTagBudget RPC.
  rpc AwardFromTagBudget(MsgAwardFromTagBudget) returns (MsgAwardFromTagBudgetResponse);

  // TopUpTagBudget defines the TopUpTagBudget RPC.
  rpc TopUpTagBudget(MsgTopUpTagBudget) returns (MsgTopUpTagBudgetResponse);

  // ToggleTagBudget defines the ToggleTagBudget RPC.
  rpc ToggleTagBudget(MsgToggleTagBudget) returns (MsgToggleTagBudgetResponse);

  // WithdrawTagBudget defines the WithdrawTagBudget RPC.
  rpc WithdrawTagBudget(MsgWithdrawTagBudget) returns (MsgWithdrawTagBudgetResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/rep/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgUpdateOperationalParams is the Msg/UpdateOperationalParams request type.
message MsgUpdateOperationalParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/rep/MsgUpdateOperationalParams";

  // authority is the address that controls operational params
  // (committee/council authority).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // operational_params defines the operational parameters to update.
  RepOperationalParams operational_params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateOperationalParamsResponse defines the response structure for
// executing a MsgUpdateOperationalParams message.
message MsgUpdateOperationalParamsResponse {}

// MsgInviteMember defines the MsgInviteMember message.
message MsgInviteMember {
  option (cosmos.msg.v1.signer) = "inviter";
  string inviter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string invitee_address = 2;
  string staked_dream = 3 [(gogoproto.customtype) = "cosmossdk.io/math.Int"];
  repeated string vouched_tags = 4;
}

// MsgInviteMemberResponse defines the MsgInviteMemberResponse message.
message MsgInviteMemberResponse {}

// MsgAcceptInvitation defines the MsgAcceptInvitation message.
message MsgAcceptInvitation {
