  // Treasury management
  string max_treasury_balance = 66 [ // Excess above this is burned each epoch (default: 100,000 DREAM)
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
