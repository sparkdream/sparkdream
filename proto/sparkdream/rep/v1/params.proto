    (gogoproto.nullable) = false
  ];
  string max_conviction_share_per_member = 60 [ // Max fraction of required conviction any single member can contribute (default 0.33)
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
