  string large_project_budget_threshold = 71 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // Permissionless creation fees (burned on creation — anti-spam + deflationary)
  string project_creation_fee = 72 [ // DREAM burned when creating a permissionless project (default 5 DREAM)
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string initiative_creation_fee_apprentice = 73 [ // DREAM burned for apprentice initiative under permissionless project (default 1 DREAM)
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string initiative_creation_fee_standard = 74 [ // DREAM burned for standard initiative under permissionless project (default 3 DREAM)
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // Permissionless access control (governance-only — not in RepOperationalParams)
  uint32 permissionless_min_trust_level = 75; // Minimum trust level to create a permissionless project (default 2 = ESTABLISHED)
  uint32 permissionless_max_tier = 76;        // Highest initiative tier allowed in permissionless projects (default 1 = STANDARD)

  string tag_creation_fee = 77 [ // DREAM burned when creating a member-registered tag (default 100 micro-DREAM)
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

