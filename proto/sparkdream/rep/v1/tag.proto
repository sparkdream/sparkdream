syntax = "proto3";
package sparkdream.rep.v1;

option go_package = "sparkdream/x/rep/types";

// Tag defines a content-tagging label. Owned by x/rep.
// Consumed by x/forum, x/collect, and x/rep's own initiative/reputation systems.
message Tag {
  string name = 1;
  uint64 usage_count = 2;
  int64 created_at = 3;
  int64 last_used_at = 4;
  int64 expiration_index = 5;
}
