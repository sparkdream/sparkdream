syntax = "proto3";

package sparkdream.rep.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "sparkdream/rep/v1/bonded_role.proto";
import "sparkdream/rep/v1/challenge.proto";
import "sparkdream/rep/v1/content_challenge.proto";
import "sparkdream/rep/v1/gov_action_appeal.proto";
import "sparkdream/rep/v1/initiative.proto";
import "sparkdream/rep/v1/interim.proto";
import "sparkdream/rep/v1/interim_template.proto";
import "sparkdream/rep/v1/invitation.proto";
import "sparkdream/rep/v1/jury_participation.proto";
import "sparkdream/rep/v1/jury_review.proto";
import "sparkdream/rep/v1/member.proto";
import "sparkdream/rep/v1/member_report.proto";
import "sparkdream/rep/v1/member_warning.proto";
import "sparkdream/rep/v1/params.proto";
import "sparkdream/rep/v1/project.proto";
import "sparkdream/rep/v1/reserved_tag.proto";
import "sparkdream/rep/v1/stake.proto";
import "sparkdream/rep/v1/tag.proto";
import "sparkdream/rep/v1/tag_budget.proto";
import "sparkdream/rep/v1/tag_budget_award.proto";
import "sparkdream/rep/v1/tag_report.proto";

option go_package = "sparkdream/x/rep/types";

// GenesisState defines the rep module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Member member_map = 2 [(gogoproto.nullable) = false];
  repeated Invitation invitation_list = 3 [(gogoproto.nullable) = false];
  uint64 invitation_count = 4;
  repeated Project project_list = 5 [(gogoproto.nullable) = false];
  uint64 project_count = 6;
  repeated Initiative initiative_list = 7 [(gogoproto.nullable) = false];
  uint64 initiative_count = 8;
  repeated Stake stake_list = 9 [(gogoproto.nullable) = false];
  uint64 stake_count = 10;
  repeated Challenge challenge_list = 11 [(gogoproto.nullable) = false];
  uint64 challenge_count = 12;
  repeated JuryReview jury_review_list = 13 [(gogoproto.nullable) = false];
  uint64 jury_review_count = 14;
  repeated Interim interim_list = 15 [(gogoproto.nullable) = false];
  uint64 interim_count = 16;
  repeated InterimTemplate interim_template_map = 17 [(gogoproto.nullable) = false];

  // Stake pools (for extended staking)
  repeated MemberStakePool member_stake_pool_list = 18 [(gogoproto.nullable) = false];
  repeated TagStakePool tag_stake_pool_list = 19 [(gogoproto.nullable) = false];
  repeated ProjectStakeInfo project_stake_info_list = 20 [(gogoproto.nullable) = false];

  // Content challenges
  repeated ContentChallenge content_challenge_list = 21 [(gogoproto.nullable) = false];
  uint64 content_challenge_count = 22;

  // Content initiative links for conviction propagation
  repeated ContentInitiativeLink content_initiative_links = 23 [(gogoproto.nullable) = false];

  // Tag registry
  repeated Tag tag_map = 24 [(gogoproto.nullable) = false];
  repeated ReservedTag reserved_tag_map = 25 [(gogoproto.nullable) = false];

  // Tag moderation
  repeated TagReport tag_report_map = 26 [(gogoproto.nullable) = false];

  // Tag budgets
  repeated TagBudget tag_budget_list = 27 [(gogoproto.nullable) = false];
  uint64 tag_budget_count = 28;
  repeated TagBudgetAward tag_budget_award_list = 29 [(gogoproto.nullable) = false];
  uint64 tag_budget_award_count = 30;

  // Accountability state
  repeated JuryParticipation jury_participation_map = 32 [(gogoproto.nullable) = false];
  repeated MemberReport member_report_map = 33 [(gogoproto.nullable) = false];
  repeated MemberWarning member_warning_list = 34 [(gogoproto.nullable) = false];
  uint64 member_warning_count = 35;
  repeated GovActionAppeal gov_action_appeal_list = 36 [(gogoproto.nullable) = false];
  uint64 gov_action_appeal_count = 37;

  // Bonded-role primitive (Phase 1 of bonded-role generalization).
  repeated BondedRole bonded_role_list = 38 [(gogoproto.nullable) = false];
  repeated BondedRoleConfig bonded_role_config_list = 39 [(gogoproto.nullable) = false];
}

// ContentInitiativeLink defines a link between content and an initiative for conviction propagation.
message ContentInitiativeLink {
  uint64 initiative_id = 1;
  int32 target_type = 2; // StakeTargetType (4=BLOG_CONTENT, 5=FORUM_CONTENT)
  uint64 target_id = 3; // Content ID
}
