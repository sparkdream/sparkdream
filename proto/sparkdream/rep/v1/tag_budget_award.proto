syntax = "proto3";
package sparkdream.rep.v1;

option go_package = "sparkdream/x/rep/types";

// TagBudgetAward defines the TagBudgetAward message.
message TagBudgetAward {
  uint64 id = 1;
  uint64 budget_id = 2;
  uint64 post_id = 3;
  string recipient = 4;
  string amount = 5;
  string reason = 6;
  int64 awarded_at = 7;
  string awarded_by = 8;
}
