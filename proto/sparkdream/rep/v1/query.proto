syntax = "proto3";

package sparkdream.rep.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "sparkdream/rep/v1/challenge.proto";
import "sparkdream/rep/v1/content_challenge.proto";
import "sparkdream/rep/v1/initiative.proto";
import "sparkdream/rep/v1/interim.proto";
import "sparkdream/rep/v1/interim_template.proto";
import "sparkdream/rep/v1/invitation.proto";
import "sparkdream/rep/v1/jury_review.proto";
import "sparkdream/rep/v1/member.proto";
import "sparkdream/rep/v1/params.proto";
import "sparkdream/rep/v1/project.proto";
import "sparkdream/rep/v1/stake.proto";

option go_package = "sparkdream/x/rep/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/params";
  }

  // ListMember Queries a list of Member items.
  rpc GetMember(QueryGetMemberRequest) returns (QueryGetMemberResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/member/{address}";
  }

  // ListMember defines the ListMember RPC.
  rpc ListMember(QueryAllMemberRequest) returns (QueryAllMemberResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/member";
  }

  // ListInvitation Queries a list of Invitation items.
  rpc GetInvitation(QueryGetInvitationRequest) returns (QueryGetInvitationResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/invitation/{id}";
  }

  // ListInvitation defines the ListInvitation RPC.
  rpc ListInvitation(QueryAllInvitationRequest) returns (QueryAllInvitationResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/invitation";
  }

  // ListProject Queries a list of Project items.
  rpc GetProject(QueryGetProjectRequest) returns (QueryGetProjectResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/project/{id}";
  }

  // ListProject defines the ListProject RPC.
  rpc ListProject(QueryAllProjectRequest) returns (QueryAllProjectResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/project";
  }

  // ListInitiative Queries a list of Initiative items.
  rpc GetInitiative(QueryGetInitiativeRequest) returns (QueryGetInitiativeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/initiative/{id}";
  }

  // ListInitiative defines the ListInitiative RPC.
  rpc ListInitiative(QueryAllInitiativeRequest) returns (QueryAllInitiativeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/initiative";
  }

  // ListStake Queries a list of Stake items.
  rpc GetStake(QueryGetStakeRequest) returns (QueryGetStakeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/stake/{id}";
  }

  // ListStake defines the ListStake RPC.
  rpc ListStake(QueryAllStakeRequest) returns (QueryAllStakeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/stake";
  }

  // ListChallenge Queries a list of Challenge items.
  rpc GetChallenge(QueryGetChallengeRequest) returns (QueryGetChallengeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/challenge/{id}";
  }

  // ListChallenge defines the ListChallenge RPC.
  rpc ListChallenge(QueryAllChallengeRequest) returns (QueryAllChallengeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/challenge";
  }

  // ListJuryReview Queries a list of JuryReview items.
  rpc GetJuryReview(QueryGetJuryReviewRequest) returns (QueryGetJuryReviewResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/jury_review/{id}";
  }

  // ListJuryReview defines the ListJuryReview RPC.
  rpc ListJuryReview(QueryAllJuryReviewRequest) returns (QueryAllJuryReviewResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/jury_review";
  }

  // ListInterim Queries a list of Interim items.
  rpc GetInterim(QueryGetInterimRequest) returns (QueryGetInterimResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/interim/{id}";
  }

  // ListInterim defines the ListInterim RPC.
  rpc ListInterim(QueryAllInterimRequest) returns (QueryAllInterimResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/interim";
  }

  // ListInterimTemplate Queries a list of InterimTemplate items.
  rpc GetInterimTemplate(QueryGetInterimTemplateRequest) returns (QueryGetInterimTemplateResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/interim_template/{template_id}";
  }

  // ListInterimTemplate defines the ListInterimTemplate RPC.
  rpc ListInterimTemplate(QueryAllInterimTemplateRequest) returns (QueryAllInterimTemplateResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/interim_template";
  }

  // MembersByTrustLevel Queries a list of MembersByTrustLevel items.
  rpc MembersByTrustLevel(QueryMembersByTrustLevelRequest) returns (QueryMembersByTrustLevelResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/members_by_trust_level/{trust_level}";
  }

  // InvitationsByInviter Queries a list of InvitationsByInviter items.
  rpc InvitationsByInviter(QueryInvitationsByInviterRequest) returns (QueryInvitationsByInviterResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/invitations_by_inviter/{inviter}";
  }

  // InterimsByAssignee Queries a list of InterimsByAssignee items.
  rpc InterimsByAssignee(QueryInterimsByAssigneeRequest) returns (QueryInterimsByAssigneeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/interims_by_assignee/{assignee}";
  }

  // InterimsByType Queries a list of InterimsByType items.
  rpc InterimsByType(QueryInterimsByTypeRequest) returns (QueryInterimsByTypeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/interims_by_type/{interim_type}";
  }

  // InterimsByReference Queries a list of InterimsByReference items.
  rpc InterimsByReference(QueryInterimsByReferenceRequest) returns (QueryInterimsByReferenceResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/interims_by_reference/{reference_type}/{reference_id}";
  }

  // ProjectsByCouncil Queries a list of ProjectsByCouncil items.
  rpc ProjectsByCouncil(QueryProjectsByCouncilRequest) returns (QueryProjectsByCouncilResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/projects_by_council/{council}";
  }

  // InitiativesByProject Queries a list of InitiativesByProject items.
  rpc InitiativesByProject(QueryInitiativesByProjectRequest) returns (QueryInitiativesByProjectResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/initiatives_by_project/{project_id}";
  }

  // InitiativesByAssignee Queries a list of InitiativesByAssignee items.
  rpc InitiativesByAssignee(QueryInitiativesByAssigneeRequest) returns (QueryInitiativesByAssigneeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/initiatives_by_assignee/{assignee}";
  }

  // AvailableInitiatives Queries a list of AvailableInitiatives items.
  rpc AvailableInitiatives(QueryAvailableInitiativesRequest) returns (QueryAvailableInitiativesResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/available_initiatives";
  }

  // StakesByStaker Queries a list of StakesByStaker items.
  rpc StakesByStaker(QueryStakesByStakerRequest) returns (QueryStakesByStakerResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/stakes_by_staker/{staker}";
  }

  // StakesByTarget Queries a list of StakesByTarget items.
  rpc StakesByTarget(QueryStakesByTargetRequest) returns (QueryStakesByTargetResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/stakes_by_target/{target_type}/{target_id}";
  }

  // InitiativeConviction Queries a list of InitiativeConviction items.
  rpc InitiativeConviction(QueryInitiativeConvictionRequest) returns (QueryInitiativeConvictionResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/initiative_conviction/{initiative_id}";
  }

  // ChallengesByInitiative Queries a list of ChallengesByInitiative items.
  rpc ChallengesByInitiative(QueryChallengesByInitiativeRequest) returns (QueryChallengesByInitiativeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/challenges_by_initiative/{initiative_id}";
  }

  // Reputation Queries a list of Reputation items.
  rpc Reputation(QueryReputationRequest) returns (QueryReputationResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/reputation/{address}/{tag}";
  }

  // PendingStakeRewards queries pending rewards for a stake
  rpc PendingStakeRewards(QueryPendingStakeRewardsRequest) returns (QueryPendingStakeRewardsResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/stake/{stake_id}/pending_rewards";
  }

  // GetMemberStakePool queries a member's stake pool info
  rpc GetMemberStakePool(QueryGetMemberStakePoolRequest) returns (QueryGetMemberStakePoolResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/member_stake_pool/{member}";
  }

  // GetTagStakePool queries a tag's stake pool info
  rpc GetTagStakePool(QueryGetTagStakePoolRequest) returns (QueryGetTagStakePoolResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/tag_stake_pool/{tag}";
  }

  // GetProjectStakeInfo queries a project's stake info
  rpc GetProjectStakeInfo(QueryGetProjectStakeInfoRequest) returns (QueryGetProjectStakeInfoResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/project_stake_info/{project_id}";
  }

  // ContentConviction queries the total conviction score for a content item
  rpc ContentConviction(QueryContentConvictionRequest) returns (QueryContentConvictionResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/content_conviction/{target_type}/{target_id}";
  }

  // AuthorBond queries the author bond for a content item
  rpc AuthorBond(QueryAuthorBondRequest) returns (QueryAuthorBondResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/author_bond/{target_type}/{target_id}";
  }

  // GetContentChallenge queries a content challenge by ID
  rpc GetContentChallenge(QueryGetContentChallengeRequest) returns (QueryGetContentChallengeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/content_challenge/{id}";
  }

  // ListContentChallenge queries all content challenges with pagination
  rpc ListContentChallenge(QueryAllContentChallengeRequest) returns (QueryAllContentChallengeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/content_challenge";
  }

  // ContentChallengesByTarget queries content challenges by target type and ID
  rpc ContentChallengesByTarget(QueryContentChallengesByTargetRequest) returns (QueryContentChallengesByTargetResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/content_challenges_by_target/{target_type}/{target_id}";
  }

  // ContentByInitiative queries content items linked to an initiative for conviction propagation
  rpc ContentByInitiative(QueryContentByInitiativeRequest) returns (QueryContentByInitiativeResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/content_by_initiative/{initiative_id}";
  }

  // DreamSupplyStats queries aggregate DREAM supply statistics
  rpc DreamSupplyStats(QueryDreamSupplyStatsRequest) returns (QueryDreamSupplyStatsResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/dream_supply_stats";
  }

  // MintBurnRatio queries the current season's mint/burn ratio
  rpc MintBurnRatio(QueryMintBurnRatioRequest) returns (QueryMintBurnRatioResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/mint_burn_ratio";
  }

  // EffectiveApy queries the effective staking APY from the seasonal pool
  rpc EffectiveApy(QueryEffectiveApyRequest) returns (QueryEffectiveApyResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/effective_apy";
  }

  // TreasuryStatus queries the treasury balance and flows
  rpc TreasuryStatus(QueryTreasuryStatusRequest) returns (QueryTreasuryStatusResponse) {
    option (google.api.http).get = "/sparkdream/rep/v1/treasury_status";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

