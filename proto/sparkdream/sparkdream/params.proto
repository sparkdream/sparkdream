syntax = "proto3";
package sparkdream.sparkdream;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "sparkdream/x/sparkdream/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "sparkdream/x/sparkdream/Params";
  option (gogoproto.equal) = true;

  
}