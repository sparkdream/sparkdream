syntax = "proto3";
package sparkdream.common.v1;

import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sparkdream/common/v1/moderation_reason.proto";

option go_package = "sparkdream/x/common/types";

// FlagRecord records a single member's flag on a piece of content.
// Shared across modules (x/forum, x/collect) for consistent moderation records.
message FlagRecord {
  string flagger = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  ModerationReason reason = 2;
  string reason_text = 3;
  int64 flagged_at = 4;
  string weight = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}
