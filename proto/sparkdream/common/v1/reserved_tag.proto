syntax = "proto3";
package sparkdream.common.v1;

option go_package = "sparkdream/x/common/types";

// ReservedTag defines a tag reserved by authority (governance or council).
// Storage is owned by x/forum; other modules check reservation via the TagKeeper interface.
message ReservedTag {
  string name = 1;
  string authority = 2;
  bool members_can_use = 3;
}
