syntax = "proto3";

package sparkdream.session.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "sparkdream/session/v1/params.proto";

option go_package = "sparkdream/x/session/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // UpdateOperationalParams defines an operation for updating the module's
  // operational parameters. Authorized for Commons Council Operations Committee.
  rpc UpdateOperationalParams(MsgUpdateOperationalParams) returns (MsgUpdateOperationalParamsResponse);

  // CreateSession creates a new session key delegation.
  rpc CreateSession(MsgCreateSession) returns (MsgCreateSessionResponse);

  // RevokeSession revokes an active session.
  rpc RevokeSession(MsgRevokeSession) returns (MsgRevokeSessionResponse);

  // ExecSession executes messages using a session key.
  rpc ExecSession(MsgExecSession) returns (MsgExecSessionResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/session/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message MsgUpdateParamsResponse {}

// MsgUpdateOperationalParams is the Msg/UpdateOperationalParams request type.
// Authorized: Commons Council Operations Committee (via IsCouncilAuthorized).
message MsgUpdateOperationalParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/session/MsgUpdateOperationalParams";

  // authority is the address authorized to update operational params.
  // Can be: governance authority, Commons Council policy address,
  // or Operations Committee policy address.
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // operational_params defines the operational parameters to update.
  SessionOperationalParams operational_params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message MsgUpdateOperationalParamsResponse {}

// MsgCreateSession creates a new session key delegation. Signed by the granter.
message MsgCreateSession {
  option (cosmos.msg.v1.signer) = "granter";

  string granter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string grantee = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated string allowed_msg_types = 3;
  cosmos.base.v1beta1.Coin spend_limit = 4 [(gogoproto.nullable) = false];
  google.protobuf.Timestamp expiration = 5 [
    (gogoproto.nullable) = false,
    (gogoproto.stdtime) = true
  ];
  uint64 max_exec_count = 6;
}

message MsgCreateSessionResponse {}

// MsgRevokeSession revokes an active session. Signed by the granter.
message MsgRevokeSession {
  option (cosmos.msg.v1.signer) = "granter";

  string granter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string grantee = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgRevokeSessionResponse {}

// MsgExecSession executes messages using a session key. Signed by the grantee.
message MsgExecSession {
  option (cosmos.msg.v1.signer) = "grantee";

  string grantee = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string granter = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // Inner messages to execute on behalf of the granter (max 10).
  repeated google.protobuf.Any msgs = 3;
}

message MsgExecSessionResponse {}
