syntax = "proto3";

package sparkdream.name.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sparkdream/name/v1/params.proto";

option go_package = "sparkdream/x/name/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // RegisterName defines the RegisterName RPC.
  rpc RegisterName(MsgRegisterName) returns (MsgRegisterNameResponse);

  // SetPrimary defines the SetPrimary RPC.
  rpc SetPrimary(MsgSetPrimary) returns (MsgSetPrimaryResponse);

  // FileDispute files a name ownership dispute with DREAM staking.
  rpc FileDispute(MsgFileDispute) returns (MsgFileDisputeResponse);

  // ContestDispute allows the current name owner to contest a filed dispute.
  // Triggers jury review via x/rep.
  rpc ContestDispute(MsgContestDispute) returns (MsgContestDisputeResponse);

  // ResolveDispute resolves a name dispute after jury verdict or governance decision.
  rpc ResolveDispute(MsgResolveDispute) returns (MsgResolveDisputeResponse);

  // UpdateName defines the UpdateName RPC.
  rpc UpdateName(MsgUpdateName) returns (MsgUpdateNameResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/name/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgRegisterName defines the MsgRegisterName message.
message MsgRegisterName {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
  string data = 3;
}

// MsgRegisterNameResponse defines the MsgRegisterNameResponse message.
message MsgRegisterNameResponse {}

// MsgSetPrimary defines the MsgSetPrimary message.
message MsgSetPrimary {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
}

// MsgSetPrimaryResponse defines the MsgSetPrimaryResponse message.
message MsgSetPrimaryResponse {}

// MsgFileDispute files a name dispute. The claimant stakes DREAM tokens.
message MsgFileDispute {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
  string reason = 3;  // Why the claimant believes they should own this name
}

// MsgFileDisputeResponse defines the MsgFileDisputeResponse message.
message MsgFileDisputeResponse {}

// MsgContestDispute allows the current name owner to contest a dispute.
// The owner stakes DREAM tokens and a jury review is triggered.
message MsgContestDispute {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/name/MsgContestDispute";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; // Current owner
  string name = 2;
  string reason = 3;  // Why the dispute is invalid
}

// MsgContestDisputeResponse defines the response for MsgContestDispute.
message MsgContestDisputeResponse {}

// MsgResolveDispute resolves a name dispute.
// Authorized: Commons Council, Operations Committee, governance authority, or x/rep jury callback.
message MsgResolveDispute {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
  string new_owner = 3;          // Only used if transfer_approved
  bool transfer_approved = 4;    // true = name transfers to claimant, false = dismiss dispute
}

// MsgResolveDisputeResponse defines the MsgResolveDisputeResponse message.
message MsgResolveDisputeResponse {}

// MsgUpdateName defines the MsgUpdateName message.
message MsgUpdateName {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
  string data = 3;
}

// MsgUpdateNameResponse defines the MsgUpdateNameResponse message.
message MsgUpdateNameResponse {
  string name = 1;
  string owner = 2;
}
