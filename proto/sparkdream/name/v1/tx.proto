syntax = "proto3";

package sparkdream.name.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sparkdream/name/v1/params.proto";

option go_package = "sparkdream/x/name/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // RegisterName defines the RegisterName RPC.
  rpc RegisterName(MsgRegisterName) returns (MsgRegisterNameResponse);

  // SetPrimary defines the SetPrimary RPC.
  rpc SetPrimary(MsgSetPrimary) returns (MsgSetPrimaryResponse);

  // FileDispute defines the FileDispute RPC.
  rpc FileDispute(MsgFileDispute) returns (MsgFileDisputeResponse);

  // ResolveDispute defines the ResolveDispute RPC.
  rpc ResolveDispute(MsgResolveDispute) returns (MsgResolveDisputeResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "sparkdream/x/name/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgRegisterName defines the MsgRegisterName message.
message MsgRegisterName {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
  string data = 3;
}

// MsgRegisterNameResponse defines the MsgRegisterNameResponse message.
message MsgRegisterNameResponse {}

// MsgSetPrimary defines the MsgSetPrimary message.
message MsgSetPrimary {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
}

// MsgSetPrimaryResponse defines the MsgSetPrimaryResponse message.
message MsgSetPrimaryResponse {}

// MsgFileDispute defines the MsgFileDispute message.
message MsgFileDispute {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
}

// MsgFileDisputeResponse defines the MsgFileDisputeResponse message.
message MsgFileDisputeResponse {}

// MsgResolveDispute defines the MsgResolveDispute message.
message MsgResolveDispute {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
  string new_owner = 3;
}

// MsgResolveDisputeResponse defines the MsgResolveDisputeResponse message.
message MsgResolveDisputeResponse {}
